# Benchmark regression monitor configuration.
#
# Each commit is one logical step — wall-clock time between commits
# does not affect the detection math.
#
# Built-in checks:
#   ewma       - Exponentially Weighted Moving Average control chart
#   cusum      - Tabular CUSUM (detects sustained mean shifts)
#   threshold  - Static upper/lower bounds
#   pct_change - Percentage change from rolling mean
#
# Benchmark names are matched by substring or trailing wildcard ("tpch*").
#
# Each benchmark can run multiple checks (multi-check form) or a single
# check (simple form with params at top level).

defaults:
  check: ewma
  span: 10
  sigma: 3.0
  min_observations: 5

benchmarks:
  # S3 benchmarks are noisier — require a larger deviation to alert
  tpch-s3*:
    check: ewma
    sigma: 4.0
    span: 15
    min_observations: 8

  fineweb-s3*:
    check: ewma
    sigma: 4.0
    span: 15
    min_observations: 8

  # Compression benchmarks tend to be stable — tighter bounds
  compress*:
    check: ewma
    sigma: 2.5
    span: 8

  # Random access: use CUSUM (better at catching gradual drift)
  random-access*:
    check: cusum
    cusum_threshold: 4.0
    drift: 0.3
    min_observations: 8
