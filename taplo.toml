include = ["**/Cargo.toml", "deny.toml", "_typos.toml"]
exclude = ["**/target/**", "**/java/**", "**/.venv/**"]

[formatting]
allowed_blank_lines = 1
indent_string = "    "
reorder_keys = false

[[rule]]
include = ["**/Cargo.toml"]
keys = ["workspace.dependencies", "dependencies", "dev-dependencies"]

[rule.formatting]
reorder_keys = true
