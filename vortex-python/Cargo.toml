[package]
name = "vortex-python"
authors = { workspace = true }
categories = { workspace = true }
description = "Python bindings for Vortex, an Apache Arrow-compatible toolkit for working with compressed array data."
edition = { workspace = true }
homepage = { workspace = true }
include = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
publish = false
readme = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
build = "build.rs"

[lints]
workspace = true

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
arrow-array = { workspace = true }
arrow-data = { workspace = true }
arrow-schema = { workspace = true }
bytes = { workspace = true }
itertools = { workspace = true }
log = { workspace = true }
object_store = { workspace = true, features = ["aws", "gcp", "azure", "http"] }
parking_lot = { workspace = true }
pyo3 = { workspace = true, features = ["abi3", "abi3-py311"] }
pyo3-bytes = { workspace = true }
pyo3-log = { workspace = true }
tokio = { workspace = true, features = ["fs", "rt-multi-thread"] }
url = { workspace = true }
vortex = { workspace = true, features = ["object_store", "python", "tokio"] }

[dev-dependencies]
vortex-array = { workspace = true, features = ["test-harness"] }
