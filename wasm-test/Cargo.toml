[package]
name = "wasm-test"
description = "Integration smoketest for WASM target support (wasm32-unknown-unknown and wasm32-wasip1)"
repository = "https://github.com/spiraldb/vortex"
authors = ["Vortex Authors <hello@vortex.dev>"]
license = "Apache-2.0"
version = "0.0.1"
publish = false
edition = "2024"

[lib]
crate-type = ["cdylib"]

[[bin]]
name = "wasm-test"
path = "src/main.rs"

[dependencies]
vortex = { path = "../vortex", default-features = false }
wasm-bindgen = "0.2"

[dependencies.web-sys]
features = ["console"]
version = "0.3"

[dev-dependencies]
wasm-bindgen-test = "0.3"
