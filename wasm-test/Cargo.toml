[package]
name = "wasm-test"
description = "Small integration smoketest for wasm32-unknown-unknown target support"
repository = "https://github.com/spiraldb/vortex"
authors = ["Vortex Authors <hello@vortex.dev>"]
license = "Apache-2.0"
version = "0.0.1"
publish = false
edition = "2024"
rust-version = "1.86"

[dependencies]
vortex = { path = "../vortex", default-features = false }

[profile.ci]
inherits = "dev"
debug = "line-tables-only"
incremental = false

# wasm-test is excluded from the workspace, so it does not inherit the root
# [patch.crates-io]; pin the in-development FastLanes here too until a release is cut.
[patch.crates-io]
fastlanes = { git = "https://github.com/spiraldb/fastlanes", rev = "6c10ea72cf693a17e994aa6401604ebedbeda453" }
