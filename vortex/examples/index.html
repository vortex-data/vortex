<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Geo Web</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #map {
            width: 100%;
            height: 85vh;
        }
        #info {
            width: 100%;
            height: 15vh;
            padding: 20px;
            background-color: #f5f5f5;
            border-top: 2px solid #ddd;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info">
        <h3>Information Panel</h3>
        <div id="results">
            <p>Move the map to see building counts...</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map centered on San Francisco
        const map = L.map('map').setView([37.7749, -122.4194], 13);

        // Add CartoDB Dark tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Store reference to current GeoJSON layer
        let currentLayer = null;

        // Function to update viewport data
        async function updateViewport() {
            const bounds = map.getBounds();
            const zoom = map.getZoom();

            const resultsDiv = document.getElementById('results');

            // Check if zoom level is sufficient
            if (zoom < 12) {
                // Remove previous layer if it exists
                if (currentLayer) {
                    map.removeLayer(currentLayer);
                    currentLayer = null;
                }

                resultsDiv.innerHTML = `
                    <p>Zoom in to level 12 or higher to see building data</p>
                    <p>Current zoom level: ${zoom}</p>
                `;
                return;
            }

            const params = new URLSearchParams({
                south: bounds.getSouth(),
                west: bounds.getWest(),
                north: bounds.getNorth(),
                east: bounds.getEast(),
                zoom: zoom
            });

            try {
                // First, fetch the count
                const countResponse = await fetch(`/api/counts?${params}`);
                const countData = await countResponse.json();
                const buildingCount = countData.count;

                // Update results panel
                let html = `<p><strong>There are ${buildingCount.toLocaleString()} Buildings in the viewport</strong></p>`;

                // Remove previous layer if it exists
                if (currentLayer) {
                    map.removeLayer(currentLayer);
                    currentLayer = null;
                }

                // Only fetch and display pins if count <= 3,000
                if (buildingCount <= 3000 && buildingCount > 0) {
                    const pinsResponse = await fetch(`/api/pins?${params}`);
                    const geojson = await pinsResponse.json();

                    currentLayer = L.geoJSON(geojson, {
                        pointToLayer: function(feature, latlng) {
                            return L.circleMarker(latlng, {
                                radius: 8,
                                fillColor: "#ff7800",
                                color: "#000",
                                weight: 1,
                                opacity: 1,
                                fillOpacity: 0.8
                            });
                        },
                        onEachFeature: function(feature, layer) {
                            if (feature.properties) {
                                const popupContent = `
                                    <strong>${feature.properties.name}</strong><br>
                                    ${feature.properties.description}
                                `;
                                layer.bindPopup(popupContent);
                            }
                        }
                    }).addTo(map);

                    html += `<p style="color: #4CAF50;">Displaying ${geojson.features.length.toLocaleString()} pins</p>`;
                } else if (buildingCount > 3000) {
                    html += `<p style="color: #ff7800;">Too many buildings to display (zoom in for details)</p>`;
                }

                html += `
                    <p>Zoom level: ${zoom}</p>
                    <p>Bounds: ${bounds.getSouth().toFixed(4)}, ${bounds.getWest().toFixed(4)} to ${bounds.getNorth().toFixed(4)}, ${bounds.getEast().toFixed(4)}</p>
                `;
                resultsDiv.innerHTML = html;
            } catch (error) {
                console.error('Error updating viewport:', error);
                document.getElementById('results').innerHTML = `
                    <p style="color: red;">Error updating viewport: ${error.message}</p>
                `;
            }
        }

        // Update on map move end (after pan/zoom)
        map.on('moveend', updateViewport);

        // Initial update
        updateViewport();
    </script>
</body>
</html>
