[package]
name = "vortex-threshold-aggregator"
description = "CLI tool for aggregating ISA threshold benchmark results and generating Rust code"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
homepage.workspace = true
keywords.workspace = true
publish = false

[[bin]]
name = "threshold-aggregator"
path = "src/main.rs"

[dependencies]
clap = { workspace = true, features = ["derive"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
vortex-threshold-traits = { path = "../vortex-threshold-traits" }

[lints]
workspace = true
