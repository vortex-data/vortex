[package]
name = "gpu-video-demo"
authors = { workspace = true }
description = "GPU video streaming demo: Vortex scan → NVENC H.264 → SRT"
edition = { workspace = true }
homepage = { workspace = true }
include = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
publish = false
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[lints]
workspace = true

[dependencies]
bytes = { workspace = true }
clap = { workspace = true, features = ["derive"] }
cudarc = { workspace = true }
futures = { workspace = true, features = ["executor"] }
object_store = { workspace = true, features = ["aws", "fs"] }
srt-tokio = { workspace = true }
tokio = { workspace = true, features = ["macros", "full"] }
tracing = { workspace = true, features = ["std", "attributes"] }
tracing-perfetto = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
url = { workspace = true }
vortex = { workspace = true, features = ["tokio"] }
vortex-cuda = { workspace = true, features = ["_test-harness"] }
vortex-cuda-macros = { workspace = true }
vortex-nvenc = { workspace = true }
