[package]
name = "vortex-cuda"
authors.workspace = true
description = "CUDA compute for Vortex"
edition = { workspace = true }
homepage = { workspace = true }
categories = { workspace = true }
include = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
readme = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
publish = false

[lints]
workspace = true

[features]
default = []
_test-harness = []
unstable_encodings = ["vortex/unstable_encodings"]

[dependencies]
anyhow = { workspace = true }
arc-swap = { workspace = true }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true }
cudarc = { workspace = true, features = ["f16"] }
futures = { workspace = true, features = ["executor"] }
itertools = { workspace = true }
kanal = { workspace = true }
num-traits = { workspace = true }
object_store = { workspace = true, features = ["fs"] }
parking_lot = { workspace = true }
parquet = { workspace = true, features = ["arrow", "async"] }
prost = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros", "rt-multi-thread", "sync"] }
tpchgen = { workspace = true }
tpchgen-arrow = { workspace = true }
tracing = { workspace = true, features = ["std", "attributes"] }
vortex = { workspace = true, features = ["zstd"] }
vortex-array = { workspace = true, features = ["cudarc"] }
vortex-cub = { path = "cub" }
vortex-cuda-macros = { workspace = true }
vortex-error = { workspace = true, features = ["object_store"] }
vortex-nvcomp = { path = "nvcomp" }

[[bin]]
name = "gen_tpch_lineitem"
path = "src/bin/gen_tpch_lineitem.rs"

[dev-dependencies]
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
criterion = { package = "codspeed-criterion-compat-walltime", version = "4.3.0" }
futures = { workspace = true, features = ["executor"] }
parquet = { workspace = true, features = ["arrow", "async"] }
rstest = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros", "fs"] }
vortex-array = { workspace = true, features = ["_test-harness"] }
vortex-cuda = { path = ".", features = ["_test-harness"] }
vortex-fsst = { workspace = true, features = ["_test-harness"] }
vortex-onpair = { workspace = true }

[build-dependencies]
bindgen = { workspace = true }
fastlanes = { workspace = true }

[[bench]]
name = "for_cuda"
harness = false

[[bench]]
name = "dict_cuda"
harness = false

[[bench]]
name = "zstd_cuda"
harness = false

[[bench]]
name = "filter_cuda"
harness = false

[[bench]]
name = "runend_cuda"
harness = false

[[bench]]
name = "date_time_parts_cuda"
harness = false

[[bench]]
name = "bitpacked_cuda"
harness = false

[[bench]]
name = "alp_cuda"
harness = false

[[bench]]
name = "dynamic_dispatch_cuda"
harness = false

[[bench]]
name = "throughput_cuda"
harness = false

[[bench]]
name = "core_primitives"
harness = false

[[bench]]
name = "fsst_cuda"
harness = false

[[bench]]
name = "onpair_real_data"
harness = false
