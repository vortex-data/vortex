[package]
name = "vortex-cuda"
authors.workspace = true
description = "CUDA compute for Vortex"
edition = { workspace = true }
homepage = { workspace = true }
categories = { workspace = true }
include = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
readme = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[lints]
workspace = true

[features]
default = []
_test-harness = []

[dependencies]
async-trait = { workspace = true }
cudarc = { workspace = true }
fastlanes = { workspace = true }
futures = { workspace = true, features = ["executor"] }
kanal = { workspace = true }
tracing = { workspace = true }
vortex-alp = { workspace = true }
vortex-array = { workspace = true }
vortex-buffer = { workspace = true }
vortex-cuda-macros = { workspace = true }
vortex-decimal-byte-parts = { workspace = true }
vortex-dtype = { workspace = true, features = ["cudarc"] }
vortex-error = { workspace = true }
vortex-fastlanes = { workspace = true }
vortex-mask = { workspace = true }
vortex-nvcomp = { path = "nvcomp" }
vortex-session = { workspace = true }
vortex-utils = { workspace = true }
vortex-zigzag = { workspace = true }
vortex-zstd = { workspace = true }

[dev-dependencies]
criterion = { package = "codspeed-criterion-compat-walltime", version = "4.3.0" }
futures = { workspace = true, features = ["executor"] }
rstest = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
vortex-array = { workspace = true, features = ["_test-harness"] }
vortex-cuda = { path = ".", features = ["_test-harness"] }
vortex-dtype = { workspace = true, features = ["cudarc"] }
vortex-scalar = { workspace = true }

[build-dependencies]
fastlanes = { workspace = true }

[[bench]]
name = "for_cuda"
harness = false

[[bench]]
name = "dict_cuda"
harness = false

[[bench]]
name = "zstd_cuda"
harness = false
