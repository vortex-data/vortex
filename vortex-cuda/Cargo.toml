[package]
name = "vortex-cuda"
authors.workspace = true
description = "CUDA compute for Vortex"
edition = { workspace = true }
homepage = { workspace = true }
categories = { workspace = true }
include = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
readme = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }
publish = false

[lints]
workspace = true

[features]
default = []
_test-harness = []
unstable_encodings = ["vortex/unstable_encodings"]

[dependencies]
arc-swap = { workspace = true }
arrow-data = { workspace = true, features = ["ffi"] }
arrow-schema = { workspace = true, features = ["ffi"] }
async-trait = { workspace = true }
cudarc = { workspace = true, features = ["f16"] }
fastlanes = { workspace = true }
flatbuffers = { workspace = true }
futures = { workspace = true, features = ["executor"] }
kanal = { workspace = true }
paste = { workspace = true }
prost = { workspace = true }
tokio = { workspace = true, features = ["fs"] }
tracing = { workspace = true, features = ["std", "attributes"] }
vortex = { workspace = true, features = ["zstd"] }
# Keep vortex-array and vortex-error as direct deps for macro hygiene: encoding
# macros (e.g. `match_each_alp_float_ptype!`) expand to bare `vortex_array::`
# and `vortex_error::` paths that must resolve as crate names at the call site.
vortex-array = { workspace = true, features = ["cudarc"] }
vortex-cub = { path = "cub" }
vortex-cuda-macros = { workspace = true }
vortex-error = { workspace = true }
vortex-nvcomp = { path = "nvcomp" }

[dev-dependencies]
criterion = { package = "codspeed-criterion-compat-walltime", version = "4.3.0" }
futures = { workspace = true, features = ["executor"] }
rstest = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
vortex-array = { workspace = true, features = ["_test-harness"] }
vortex-cuda = { path = ".", features = ["_test-harness"] }

[build-dependencies]
bindgen = { workspace = true }
fastlanes = { workspace = true }

[[bench]]
name = "for_cuda"
harness = false

[[bench]]
name = "dict_cuda"
harness = false

[[bench]]
name = "zstd_cuda"
harness = false

[[bench]]
name = "filter_cuda"
harness = false

[[bench]]
name = "runend_cuda"
harness = false

[[bench]]
name = "date_time_parts_cuda"
harness = false

[[bench]]
name = "bitpacked_cuda"
harness = false

[[bench]]
name = "dynamic_dispatch_cuda"
harness = false

[[bench]]
name = "throughput_cuda"
harness = false
