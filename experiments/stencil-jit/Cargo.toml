[package]
name = "stencil-jit"
version = "0.0.0"
edition = "2024"
publish = false
description = "Research prototype: copy-and-patch JIT for fused SIMD eq/neq."

[workspace]

[dependencies]
libc = "0.2"

[build-dependencies]
cranelift-codegen = { version = "0.118", default-features = false, features = ["x86", "host-arch", "std"] }
cranelift-frontend = { version = "0.118", default-features = false, features = ["std"] }
target-lexicon = "0.13"

[dev-dependencies]
divan = "0.1"

[[bench]]
name = "throughput"
harness = false

[lints.rust]
unsafe_op_in_unsafe_fn = "deny"
