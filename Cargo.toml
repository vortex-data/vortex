[workspace]
members = [
    # Core crates in dependency order
    "vortex-array-macros",
    "vortex-error",
    "vortex-buffer",
    "vortex-mask",
    "vortex-utils",
    "vortex-session",
    "vortex-flatbuffers",
    "vortex-metrics",
    "vortex-io",
    "vortex-proto",
    "vortex-array",
    "vortex-row",
    "vortex-tensor",
    "vortex-json",
    "vortex-compressor",
    "vortex-btrblocks",
    "vortex-layout",
    "vortex-scan",
    "vortex-file",
    "vortex-ipc",
    "vortex",
    "vortex-bench",
    "vortex-datafusion",
    "vortex-duckdb",
    "vortex-cuda",
    "vortex-cuda/cub",
    "vortex-cuda/ffi",
    "vortex-cuda/gpu-scan-cli",
    "vortex-cuda/macros",
    "vortex-cuda/nvcomp",
    "vortex-cxx",
    "vortex-ffi",
    "fuzz",
    "vortex-jni",
    "vortex-python",
    "vortex-tui",
    "vortex-web/crate",
    "vortex-sqllogictest",
    "vortex-test/compat-gen",
    "vortex-test/e2e-cuda",
    "xtask",
    # Encodings
    "encodings/fastlanes",
    "encodings/decimal-byte-parts",
    "encodings/runend",
    "encodings/sequence",
    "encodings/alp",
    "encodings/datetime-parts",
    "encodings/fsst",
    "encodings/pco",
    "encodings/sparse",
    "encodings/zigzag",
    "encodings/zstd",
    "encodings/bytebool",
    "encodings/parquet-variant",
    # Experimental encodings
    "encodings/experimental/onpair",
    # Benchmarks
    "benchmarks/lance-bench",
    "benchmarks/compress-bench",
    "benchmarks/datafusion-bench",
    "benchmarks/duckdb-bench",
    "benchmarks/random-access-bench",
    "vortex-geo",
]
exclude = ["java/testfiles", "wasm-test"]
resolver = "2"

[workspace.package]
authors = ["Vortex Authors <hello@vortex.dev>"]
categories = ["database-implementations", "data-structures", "compression"]
edition = "2024"
homepage = "https://github.com/spiraldb/vortex"
include = [

    "build.rs",
    "src/**/*.rs",
    "Cargo.toml",
    "proto/**/*.proto",
    "flatbuffers/**/*.fbs",
    "README.md",
]
keywords = ["vortex"]
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/spiraldb/vortex"
rust-version = "1.91.0"
version = "0.1.0"

