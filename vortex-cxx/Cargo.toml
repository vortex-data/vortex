[package]
name = "vortex-cxx-rs"
version = "0.1.0"
edition = "2021"
authors = ["Vortex Authors <hello@vortex.dev>"]
description = "C++ bindings for Vortex generated from Rust using cxx"
license = "Apache-2.0"
publish = false

# empty workspace to keep it out of the workspace of the parent `vortex` folder
[workspace]

[lib]
crate-type = ["staticlib"]

[dependencies]
arrow-array = { version = "55.0", features = ["ffi"] }
arrow-schema = "55.0"
cxx = "1.0"
futures = { version = "0.3.31", default-features = false }
prost = "0.13.4"
take_mut = "0.2.2"
tokio = { version = "1.45.1", features = ["rt", "rt-multi-thread", "macros"] }
vortex = { path = "../vortex", features = ["tokio"] }

[build-dependencies]
cxx-build = "1.0"

[features]
gen_test_data = []
