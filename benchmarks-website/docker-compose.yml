services:
  benchmarks-website:
    image: ghcr.io/vortex-data/vortex/benchmarks-website:latest
    ports:
      - "80:3000"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
    restart: unless-stopped
