[package]
name = "vortex-bench-server"
version = "0.1.0-alpha.0"
edition = "2024"
rust-version = "1.91.0"
license = "Apache-2.0"
description = "bench.vortex.dev v3 alpha server: HTTP API + HTML + DuckDB on local disk"
publish = false

[lib]
name = "vortex_bench_server"
path = "src/lib.rs"

[[bin]]
name = "vortex-bench-server"
path = "src/main.rs"

# This is a leaf binary, not part of the vortex-* public API surface.
# Errors use anyhow / thiserror and the crate is intentionally outside
# the workspace.

[dependencies]
anyhow = "1"
axum = "0.8"
base64 = "0.22"
brotli = "8.0.2"
bytes = "1.11"
dashmap = "6"
# track vortex-duckdb's bundled engine version (build.rs)
duckdb = { version = "1", features = ["bundled"] }
flate2 = "1"
futures = { version = "0.3", features = ["std"] }
hashbrown = "0.17"
maud = { version = "0.27", features = ["axum"] }
parking_lot = { version = "0.12" }
serde = { version = "1", features = ["derive", "rc"] }
serde_json = { version = "1" }
subtle = "2.6"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tower = "0.5"
tower-http = { version = "0.6", features = [
    "compression-br",
    "compression-gzip",
    "trace",
] }
tracing = { version = "0.1", features = ["std"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
twox-hash = "2.1"

[dev-dependencies]
# `filters` enables `Settings::add_filter`, which we use in
# `tests/common/mod.rs` to redact the build SHA from the HTML
# snapshots so they don't churn on every commit.
insta = { version = "1", features = ["filters"] }
reqwest = { version = "0.13", features = ["json"] }
tempfile = { version = "3" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net"] }
