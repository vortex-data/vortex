[package]
name = "vortex-bench-migrate"
version = "0.1.0-alpha.0"
edition = "2024"
rust-version = "1.91.0"
license = "Apache-2.0"
description = "One-shot historical migrator from the v2 benchmarks S3 dataset to a v3 DuckDB file"
publish = false

[[bin]]
name = "vortex-bench-migrate"
path = "src/main.rs"

# Throwaway binary, not part of the vortex-* public API surface.
# Errors use anyhow, and the crate is intentionally outside the
# workspace.

[dependencies]
anyhow = "1"
arrow-array = "58"
arrow-buffer = "58"
arrow-schema = "58"
clap = { version = "4", features = ["derive"] }
duckdb = { version = "1", features = ["bundled", "appender-arrow"] }
flate2 = "1.1"
hashbrown = "0.17"
reqwest = { version = "0.13", features = ["json", "blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing = { version = "0.1.44", features = ["std"] }
tracing-subscriber = { version = "0.3.2", features = ["env-filter", "fmt"] }
vortex-bench-server = { path = "../server" }

[dev-dependencies]
rstest = "0.26"
tempfile = "3.27"
