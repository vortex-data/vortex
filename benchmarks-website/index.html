<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Preconnect to font services -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Web Fonts -->

    <title>Vortex Benchmarks</title>

    <script type="module" id="main-script">
      import './code.js';

      // Wait for initialization to complete
      const waitForInit = () => {
        if (window.initAndRender) {
          window.initAndRender([
            ["Random Access", {
              renamedDatasets: {
                "vortex-tokio-local-disk": "vortex-nvme",
                "lance-tokio-local-disk": "lance-nvme",
                "parquet-tokio-local-disk": "parquet-nvme",
              }
            }],
            [
              "Compression",
              {
                keptCharts: [
                  "COMPRESS TIME",
                  "DECOMPRESS TIME",
                  "PARQUET RS-ZSTD COMPRESS TIME",
                  "PARQUET RS-ZSTD DECOMPRESS TIME",
                  "LANCE COMPRESS TIME",
                  "LANCE DECOMPRESS TIME",
                  "VORTEX:PARQUET-ZSTD RATIO COMPRESS TIME",
                  "VORTEX:PARQUET-ZSTD RATIO DECOMPRESS TIME",
                  "VORTEX:LANCE RATIO COMPRESS TIME",
                  "VORTEX:LANCE RATIO DECOMPRESS TIME",
                ],
                hiddenDatasets: new Set([
                  "wide table cols=1000 chunks=1 rows=1000",
                  "wide table cols=1000 chunks=50 rows=1000",
                ]),
                removedDatasets: new Set([
                  "TPC-H l_comment canonical",
                  "TPC-H l_comment chunked without fsst",
                  "wide table cols=10 chunks=1 rows=1000",
                  "wide table cols=100 chunks=1 rows=1000",
                  "wide table cols=10 chunks=50 rows=1000",
                  "wide table cols=100 chunks=50 rows=1000",
                ]),
                renamedDatasets: undefined,
              },
            ],
            [
              "Compression Size",
              {
                keptCharts: [
                  "VORTEX SIZE",
                  "PARQUET-ZSTD SIZE",
                  "LANCE SIZE",
                  "VORTEX:PARQUET-ZSTD SIZE",
                  "VORTEX:LANCE SIZE"
                ],
                hiddenDatasets: new Set(["wide table cols=1000"]),
                removedDatasets: new Set([
                  "wide table cols=10 chunks=1 rows=1000",
                  "wide table cols=100 chunks=1 rows=1000",
                  "wide table cols=10 chunks=50 rows=1000",
                  "wide table cols=100 chunks=50 rows=1000",
                ]),
              },
            ],
            [
              "Clickbench",
              {
                renamedDatasets: {
                  "DataFusion:vortex-file-compressed": "datafusion:vortex",
                  "DataFusion:parquet": "datafusion:parquet",
                  "DataFusion:arrow": "datafusion:in-memory-arrow",
                  "DataFusion:lance": "datafusion:lance",

                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
                hiddenDatasets: new Set(["datafusion:lance"]),
              },
            ],
            [
              "TPC-H (NVMe) (SF=1)",
              {
                keptCharts: undefined,
                hiddenDatasets: new Set(["datafusion:lance"]),
                removedDatasets: new Set([]),
                renamedDatasets: {
                  "DataFusion:vortex-file-compressed": "datafusion:vortex",
                  "DataFusion:parquet": "datafusion:parquet",
                  "DataFusion:arrow": "datafusion:in-memory-arrow",
                  "DataFusion:lance": "datafusion:lance",

                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
              },
            ],
            [
              "TPC-H (S3) (SF=1)",
              {
                keptCharts: undefined,
                hiddenDatasets: new Set(["datafusion:lance"]),
                renamedDatasets: {
                  "DataFusion:vortex-file-compressed": "datafusion:vortex",
                  "DataFusion:parquet": "datafusion:parquet",
                  "DataFusion:arrow": "datafusion:in-memory-arrow",
                  "DataFusion:lance": "datafusion:lance",

                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
              },
            ],
            [
              "TPC-H (NVMe) (SF=10)",
              {
                renamedDatasets: {
                  "DataFusion:vortex-file-compressed": "datafusion:vortex",
                  "DataFusion:parquet": "datafusion:parquet",
                  "DataFusion:arrow": "datafusion:in-memory-arrow",
                  "DataFusion:lance": "datafusion:lance",

                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
                hiddenDatasets: new Set(["datafusion:lance"]),
              },
            ],
            [
              "TPC-H (S3) (SF=10)",
              {
                renamedDatasets: {
                  "DataFusion:vortex-file-compressed": "datafusion:vortex",
                  "DataFusion:parquet": "datafusion:parquet",
                  "DataFusion:arrow": "datafusion:in-memory-arrow",
                  "DataFusion:lance": "datafusion:lance",

                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
                hiddenDatasets: new Set(["datafusion:lance"]),
              },
            ],
            [
              "TPC-H (NVMe) (SF=100)",
              {
                renamedDatasets: {
                  "DataFusion:vortex-file-compressed": "datafusion:vortex",
                  "DataFusion:parquet": "datafusion:parquet",
                  "DataFusion:arrow": "datafusion:in-memory-arrow",
                  "DataFusion:lance": "datafusion:lance",

                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
                hiddenDatasets: new Set(["datafusion:lance"]),
              },
            ],
            [
              "TPC-H (S3) (SF=100)",
              {
                renamedDatasets: {
                  "DataFusion:vortex-file-compressed": "datafusion:vortex",
                  "DataFusion:parquet": "datafusion:parquet",
                  "DataFusion:arrow": "datafusion:in-memory-arrow",
                  "DataFusion:lance": "datafusion:lance",

                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
                hiddenDatasets: new Set(["datafusion:lance"]),
              },
            ],
            [
              "TPC-H (NVMe) (SF=1000)",
              {
                renamedDatasets: {
                  "DataFusion:vortex-file-compressed": "datafusion:vortex",
                  "DataFusion:parquet": "datafusion:parquet",
                  "DataFusion:arrow": "datafusion:in-memory-arrow",
                  "DataFusion:lance": "datafusion:lance",

                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
                hiddenDatasets: new Set(["datafusion:lance"]),
              },
            ],
            [
              "TPC-H (S3) (SF=1000)",
              {
                renamedDatasets: {
                  "DataFusion:vortex-file-compressed": "datafusion:vortex",
                  "DataFusion:parquet": "datafusion:parquet",
                  "DataFusion:arrow": "datafusion:in-memory-arrow",
                  "DataFusion:lance": "datafusion:lance",

                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
                hiddenDatasets: new Set(["datafusion:lance"]),
              },
            ],
            [
              "TPC-DS (NVMe) (SF=1)",
              {
                renamedDatasets: {
                  "DataFusion:vortex-file-compressed": "datafusion:vortex",
                  "DataFusion:parquet": "datafusion:parquet",
                  "DataFusion:arrow": "datafusion:in-memory-arrow",

                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
              },
            ],
            [
              "TPC-DS (NVMe) (SF=10)",
              {
                renamedDatasets: {
                  "DataFusion:vortex-file-compressed": "datafusion:vortex",
                  "DataFusion:parquet": "datafusion:parquet",
                  "DataFusion:arrow": "datafusion:in-memory-arrow",

                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
              },
           ],
           [
              "Statistical and Population Genetics",
              {
                renamedDatasets: {
                  "DuckDB:vortex-file-compressed": "duckdb:vortex",
                  "DuckDB:parquet": "duckdb:parquet",
                  "DuckDB:duckdb": "duckdb:duckdb",
                },
              },
            ],
          ]);
        } else {
          setTimeout(waitForInit, 100);
        }
      };
      
      waitForInit();
    </script>
  </head>

  <body>
    <!-- Sticky Header -->
    <header class="sticky-header">
      <div class="header-content">
        <div class="header-left">
          <button id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">
            ☰
          </button>
          <a href="/" class="logo-link">
            <img src="vortex_black_nobg.svg" alt="Vortex" class="site-logo" />
          </a>
        </div>
        <h1 class="site-title">Vortex Benchmarks</h1>
        <div class="header-center">
          <div class="filter-controls">
            <button id="expand-all" class="control-btn">Expand All</button>
            <button id="collapse-all" class="control-btn">Collapse All</button>
            <select
              id="category-filter"
              class="category-filter"
              aria-label="Filter benchmarks by category"
            >
              <option value="all">All Benchmarks</option>
              <option value="Read/Write">Read/Write</option>
              <option value="Queries (NVMe)">Queries (NVMe)</option>
              <option value="Queries (S3)">Queries (S3)</option>
              <option value="TPC-H (SF=1)">TPC-H (SF=1)</option>
              <option value="TPC-H (SF=10)">TPC-H (SF=10)</option>
              <option value="TPC-H (SF=100)">TPC-H (SF=100)</option>
              <option value="TPC-H (SF=1000)">TPC-H (SF=1000)</option>
              <option value="TPC-DS (SF=1)">TPC-DS (SF=1)</option>
              <option value="TPC-DS (SF=10)">TPC-DS (SF=10)</option>
            </select>
            <input
              type="text"
              id="search-filter"
              class="search-filter"
              placeholder="Search benchmarks..."
            />
          </div>
        </div>
        <div class="header-right">
          <div class="view-controls">
            <button
              id="grid-view"
              class="view-btn active"
              aria-label="Grid view"
            >
              ⊞
            </button>
            <button id="list-view" class="view-btn" aria-label="List view">
              ☰
            </button>
          </div>
          <a
            href="https://github.com/vortex-data/vortex"
            class="repo-link"
            rel="noopener"
          >
            <svg
              class="github-logo"
              viewBox="0 0 16 16"
              width="16"
              height="16"
              fill="currentColor"
            >
              <path
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
              ></path>
            </svg>
            <span>GitHub</span>
          </a>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <div class="main-container">
      <!-- Sidebar hover zone -->
      <div class="sidebar-hover-zone" id="sidebar-hover-zone"></div>

      <!-- Sidebar Navigation -->
      <aside id="sidebar" class="sidebar collapsed">
        <nav class="sidebar-nav">
          <div class="sidebar-header">
            <h2>Navigation</h2>
            <button
              id="sidebar-close"
              class="sidebar-close"
              aria-label="Close sidebar"
            >
              ×
            </button>
          </div>
          <button id="clear-filter" class="clear-filter-btn hidden">
            Clear Filter
          </button>
          <ul id="toc" class="toc-list"></ul>
          <div class="sidebar-footer">
            <a
              href="https://vortex-benchmark-results-database.s3.amazonaws.com/data.json.gz"
              class="download-btn"
              download
            >
              Download Data
            </a>
          </div>
        </nav>
      </aside>

      <!-- Main Content -->
      <main id="main" class="main-content">
        <div class="loading-indicator" id="loading">
          <div class="spinner"></div>
          <p>Loading benchmarks...</p>
        </div>
      </main>

      <!-- Sidebar overlay for mobile -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
    </div>

    <!-- Back to Top Button -->
    <button id="back-to-top" class="back-to-top" aria-label="Back to top">
      ↑
    </button>

    <!-- Fullscreen Chart Modal -->
    <div id="chart-modal" class="chart-modal">
      <div class="modal-content">
        <button class="modal-close" id="modal-close">×</button>
        <div class="modal-chart-container">
          <canvas id="modal-chart"></canvas>
        </div>
      </div>
    </div>
  </body>
</html>
