name: Auto-fix formatting

on:
  workflow_dispatch:
    inputs:
      pr-head-sha:
        description: "The PR head commit SHA to format"
        required: true
        type: string
      pr-head-ref:
        description: "The PR head branch name"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  NIGHTLY_TOOLCHAIN: nightly-2026-02-05

jobs:
  apply-fmt:
    name: "Apply formatting fix"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The fmt-fix environment must be configured with required reviewers
    # in the repo settings. This creates an accept/reject gate on the PR
    # before the fmt commit is pushed.
    environment: fmt-fix
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ inputs.pr-head-sha }}

      - name: Install nightly for fmt
        run: rustup toolchain install $NIGHTLY_TOOLCHAIN --component rustfmt

      - name: Run cargo fmt
        run: cargo +$NIGHTLY_TOOLCHAIN fmt --all

      - name: Commit and push
        env:
          EXPECTED_SHA: ${{ inputs.pr-head-sha }}
          BRANCH: ${{ inputs.pr-head-ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: cargo fmt

          Signed-off-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          # --force-with-lease atomically checks that the remote branch HEAD
          # is still EXPECTED_SHA before pushing. If someone else pushed a
          # commit to the PR between trigger and approval, this fails safely.
          git push origin \
            "HEAD:refs/heads/$BRANCH" \
            "--force-with-lease=refs/heads/$BRANCH:$EXPECTED_SHA"
