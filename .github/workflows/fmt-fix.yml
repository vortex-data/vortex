name: Auto-fix formatting

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: ["Linters and Tests"]
    types: [completed]

env:
  CARGO_TERM_COLOR: always
  NIGHTLY_TOOLCHAIN: nightly-2026-02-05

jobs:
  check-fmt:
    name: "Check formatting"
    # For workflow_run events, only run if the triggering workflow was for a PR.
    if: >-
      github.event_name == 'pull_request'
      || (github.event_name == 'workflow_run'
          && github.event.workflow_run.event == 'pull_request'
          && github.event.workflow_run.conclusion == 'completed')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      needs-fix: ${{ steps.check.outputs.needs-fix }}
      pr-head-sha: ${{ steps.resolve.outputs.head-sha }}
      pr-head-ref: ${{ steps.resolve.outputs.head-ref }}
    steps:
      - name: Resolve PR ref
        id: resolve
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            let sha, ref;
            if (context.eventName === 'pull_request') {
              sha = context.payload.pull_request.head.sha;
              ref = context.payload.pull_request.head.ref;
            } else {
              // workflow_run: look up the PR from the head branch
              const wr = context.payload.workflow_run;
              sha = wr.head_sha;
              ref = wr.head_branch;
            }
            core.setOutput('head-sha', sha);
            core.setOutput('head-ref', ref);

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ steps.resolve.outputs.head-sha }}

      - name: Install nightly for fmt
        run: rustup toolchain install $NIGHTLY_TOOLCHAIN --component rustfmt

      - name: Check formatting
        id: check
        run: |
          if cargo +$NIGHTLY_TOOLCHAIN fmt --all --check; then
            echo "needs-fix=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs-fix=true" >> "$GITHUB_OUTPUT"
          fi

  apply-fmt:
    name: "Apply formatting fix"
    needs: check-fmt
    if: needs.check-fmt.outputs.needs-fix == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: fmt-fix
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Check out the exact commit that triggered this workflow, not the
          # latest branch HEAD (which may have moved during approval wait).
          ref: ${{ needs.check-fmt.outputs.pr-head-sha }}

      - name: Install nightly for fmt
        run: rustup toolchain install $NIGHTLY_TOOLCHAIN --component rustfmt

      - name: Run cargo fmt
        run: cargo +$NIGHTLY_TOOLCHAIN fmt --all

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: cargo fmt

          Signed-off-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

      - name: Push (fails if branch moved since trigger)
        env:
          EXPECTED_SHA: ${{ needs.check-fmt.outputs.pr-head-sha }}
          BRANCH: ${{ needs.check-fmt.outputs.pr-head-ref }}
        run: |
          # --force-with-lease atomically checks that the remote branch HEAD
          # is still EXPECTED_SHA before pushing. If someone else pushed a
          # commit to the PR between trigger and approval, this fails safely.
          git push origin \
            "HEAD:refs/heads/$BRANCH" \
            "--force-with-lease=refs/heads/$BRANCH:$EXPECTED_SHA"
