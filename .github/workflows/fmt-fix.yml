name: Auto-fix formatting

on:
  workflow_dispatch:
    inputs:
      pr-head-sha:
        description: "The PR head commit SHA to format"
        required: true
        type: string
      pr-head-ref:
        description: "The PR head branch name"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  NIGHTLY_TOOLCHAIN: nightly-2026-02-05

jobs:
  # Gate job: requires manual approval via the fmt-fix environment before
  # the formatting commit is pushed.
  approve:
    name: "Approve formatting fix"
    runs-on: ubuntu-latest
    environment: fmt-fix
    steps:
      - run: echo "Formatting fix approved"

  apply-fmt:
    name: "Apply formatting fix"
    needs: approve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Use the claude-automation environment to access the GitHub App secrets
    # so the push triggers CI.
    environment:
      name: claude-automation
      deployment: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ inputs.pr-head-sha }}
          persist-credentials: false

      - name: Install nightly for fmt
        run: rustup toolchain install $NIGHTLY_TOOLCHAIN --component rustfmt

      - name: Run cargo fmt
        run: cargo +$NIGHTLY_TOOLCHAIN fmt --all

      - name: Commit and push
        env:
          EXPECTED_SHA: ${{ inputs.pr-head-sha }}
          BRANCH: ${{ inputs.pr-head-ref }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: cargo fmt

          Signed-off-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          # Use the App token so the push triggers CI.
          git remote set-url origin \
            "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"

          # --force-with-lease atomically checks that the remote branch HEAD
          # is still EXPECTED_SHA before pushing. If someone else pushed a
          # commit to the PR between trigger and approval, this fails safely.
          git push origin \
            "HEAD:refs/heads/$BRANCH" \
            "--force-with-lease=refs/heads/$BRANCH:$EXPECTED_SHA"
