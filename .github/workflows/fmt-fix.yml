name: Auto-fix formatting

on:
  workflow_run:
    workflows: ["Linters and Tests"]
    types: [completed]

env:
  CARGO_TERM_COLOR: always
  NIGHTLY_TOOLCHAIN: nightly-2026-02-05

jobs:
  check-ci-fmt:
    name: "Check if CI fmt failed"
    # Only act on PR runs that completed (success or failure — the fmt step
    # uses continue-on-error so the workflow can "succeed" even when fmt fails).
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      fmt-failed: ${{ steps.check.outputs.fmt-failed }}
      head-sha: ${{ steps.check.outputs.head-sha }}
      head-ref: ${{ steps.check.outputs.head-ref }}
    steps:
      - name: Check CI fmt step outcome
        id: check
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const headSha = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;

            // Find the "Rust (lint)" job in the CI run.
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              ...context.repo,
              run_id: runId,
            });
            const lintJob = jobs.find(j => j.name === 'Rust (lint)');
            if (!lintJob) {
              core.info('Rust (lint) job not found — skipping');
              core.setOutput('fmt-failed', 'false');
              return;
            }

            // Find the fmt step by its id ("fmt") or name.
            const fmtStep = lintJob.steps.find(
              s => s.name === 'Rust Lint - Format'
            );
            if (!fmtStep) {
              core.info('fmt step not found — skipping');
              core.setOutput('fmt-failed', 'false');
              return;
            }

            const failed = fmtStep.conclusion === 'failure';
            core.info(`fmt step conclusion: ${fmtStep.conclusion}`);
            core.setOutput('fmt-failed', String(failed));
            core.setOutput('head-sha', headSha);
            core.setOutput('head-ref', headBranch);

  apply-fmt:
    name: "Apply formatting fix"
    needs: check-ci-fmt
    if: needs.check-ci-fmt.outputs.fmt-failed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: fmt-fix
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Check out the exact commit that CI ran against, not the latest
          # branch HEAD (which may have moved during the approval wait).
          ref: ${{ needs.check-ci-fmt.outputs.head-sha }}

      - name: Install nightly for fmt
        run: rustup toolchain install $NIGHTLY_TOOLCHAIN --component rustfmt

      - name: Run cargo fmt
        run: cargo +$NIGHTLY_TOOLCHAIN fmt --all

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: cargo fmt

          Signed-off-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

      - name: Push (fails if branch moved since CI ran)
        env:
          EXPECTED_SHA: ${{ needs.check-ci-fmt.outputs.head-sha }}
          BRANCH: ${{ needs.check-ci-fmt.outputs.head-ref }}
        run: |
          # --force-with-lease atomically checks that the remote branch HEAD
          # is still EXPECTED_SHA before pushing. If someone else pushed a
          # commit to the PR between the CI run and approval, this fails safely.
          git push origin \
            "HEAD:refs/heads/$BRANCH" \
            "--force-with-lease=refs/heads/$BRANCH:$EXPECTED_SHA"
