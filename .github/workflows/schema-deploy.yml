#
# Apply Postgres schema migrations from `migrations/*.sql` to the
# benchmarks-website RDS instance via the `scripts/migrate-schema.py`
# runner (created in PR-1.2; this workflow is wired to actually invoke
# it in PR-1.4).
#
# PR-1.1 establishes the OIDC plumbing: this skeleton runs but does
# nothing useful yet beyond proving the GitHub-OIDC -> IAM role
# assumption + AWS-region setup works end-to-end. PR-1.4 replaces the
# placeholder step with the real `python scripts/migrate-schema.py
# apply` invocation.

name: schema-deploy

on:
  push:
    branches: ["develop", "ct/bench-v4"]
    paths:
      - "migrations/**"
      - "scripts/migrate-schema.py"
      - ".github/workflows/schema-deploy.yml"
  workflow_dispatch: { }

permissions:
  id-token: write
  contents: read

# Gates the run on a manual approval in GitHub UI. Configure the
# 'schema-deploy' environment in repo settings -> Environments to
# require approval from a named approver list before the job proceeds.
concurrency:
  group: schema-deploy
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    # NOTE: a `schema-deploy` GitHub Environment with manual-approval
    # protection rules is the proper gate but requires repo-admin
    # access to create. Until that's set up, the gate is purely the
    # OIDC role's trust-policy sub-claim restricting role assumption
    # to pushes on `develop` and `ct/bench-v4`. Re-add `environment:
    # schema-deploy` here once the environment is created.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6
        with:
          role-to-assume: ${{ vars.GH_BENCH_SCHEMA_ROLE_ARN }}
          aws-region: ${{ vars.RDS_BENCH_REGION }}

      - name: Verify identity (PR-1.1 acceptance probe)
        # GitHubBenchmarkSchemaRole's inline policy grants only
        # rds-db:connect; it has no rds:DescribeDBProxies / rds:Describe*
        # so we can't probe RDS state from inside this assumed-role context.
        # `sts get-caller-identity` requires no extra IAM perms and proves
        # the OIDC -> AssumeRoleWithWebIdentity -> role assumption worked.
        # Provisioning state is verified out-of-band by the operator
        # running `aws rds describe-db-*` from their own SSO profile per
        # benchmarks-website/infra/README.md.
        run: aws sts get-caller-identity
        env:
          AWS_REGION: ${{ vars.RDS_BENCH_REGION }}

      # PR-1.4 replaces the step below with the real migration apply.
      # The intent is documented inline so a reader of this skeleton
      # can see what the wired-up workflow will do:
      #
      #   - name: Install Python dependencies
      #     run: pip install --require-hashes -r scripts/requirements.txt
      #
      #   - name: Apply pending migrations
      #     env:
      #       PGHOST:   ${{ vars.RDS_BENCH_ENDPOINT }}
      #       PGDATABASE: ${{ vars.RDS_BENCH_DB_NAME }}
      #       PGUSER:   migrator
      #       AWS_REGION: ${{ vars.RDS_BENCH_REGION }}
      #     run: python scripts/migrate-schema.py apply
      #
      - name: Placeholder for migration apply (wired in PR-1.4)
        run: echo "PR-1.4 wires this step. PR-1.1 only proves the OIDC + IAM path."
