name: PR Labels

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# We use pull_request_target (not pull_request) for two reasons:
#   1. Fork PRs get a writable token here, so we can apply the label.
#   2. We re-run on "edited", so title/description edits re-evaluate the label.
# This is safe because we never check out or execute PR code; we only read the
# PR title, body, and labels as data and compare them against a fixed allowlist.
on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, labeled, unlabeled]

permissions:
  contents: read

jobs:
  changelog_label:
    # NOTE: this name is intentionally different from the commit status context
    # ("Validate Changelog Label") below, which is the check branch protection
    # should require. The status is posted against the PR head SHA so that it
    # lands on the commit branch protection actually evaluates.
    name: Changelog Label
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write  # add the inferred changelog label
      statuses: write  # report the result against the PR head commit
    steps:
      - name: Infer, apply, and validate changelog label
        uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a  # v7.0.1
        with:
          script: |
            const CHANGELOG_LABELS = [
              "changelog/break",
              "changelog/deprecation",
              "changelog/feature",
              "changelog/performance",
              "changelog/fix",
              "changelog/docs",
              "changelog/chore",
              "changelog/skip",
            ];
            // Conventional-commit type -> changelog label. A "!" marker on the
            // type or a "BREAKING CHANGE" footer always maps to changelog/break.
            // changelog/deprecation and changelog/skip have no conventional-
            // commit equivalent and stay manual.
            const TYPE_TO_LABEL = {
              feat: "changelog/feature",
              fix: "changelog/fix",
              perf: "changelog/performance",
              docs: "changelog/docs",
              chore: "changelog/chore",
              ci: "changelog/chore",
              build: "changelog/chore",
              refactor: "changelog/chore",
              test: "changelog/chore",
              style: "changelog/chore",
              revert: "changelog/chore",
            };
            const STATUS_CONTEXT = "Validate Changelog Label";

            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const sha = pr.head.sha;

            const report = (state, description) =>
              github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha,
                state,
                context: STATUS_CONTEXT,
                description: description.slice(0, 140),
              });

            function inferLabel(title, body) {
              const m = /^\s*([a-zA-Z]+)(\([^)]*\))?(!)?:/.exec(title || "");
              const breaking = /(^|\n)BREAKING[ -]CHANGE/.test(body || "");
              if (!m) return breaking ? "changelog/break" : null;
              if (m[3] === "!" || breaking) return "changelog/break";
              return TYPE_TO_LABEL[m[1].toLowerCase()] || null;
            }

            try {
              // Read the freshest labels from the API; the webhook payload can
              // be stale on labeled/unlabeled/edited events.
              const { data: currentLabels } =
                await github.rest.issues.listLabelsOnIssue({
                  owner,
                  repo,
                  issue_number: pr.number,
                });
              let present = currentLabels
                .map((l) => l.name)
                .filter((n) => CHANGELOG_LABELS.includes(n));

              // Only auto-apply when there is no changelog label yet, so we
              // never override a maintainer's manual choice.
              if (present.length === 0) {
                const inferred = inferLabel(pr.title, pr.body);
                if (inferred) {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: pr.number,
                    labels: [inferred],
                  });
                  core.info(`Applied ${inferred} (inferred from title).`);
                  present = [inferred];
                }
              }

              if (present.length === 1) {
                core.info(`Changelog label OK: ${present[0]}`);
                await report("success", `Changelog label: ${present[0]}`);
                return;
              }

              if (present.length > 1) {
                const msg = `Multiple changelog labels (${present.join(
                  ", ",
                )}). Keep exactly one.`;
                core.warning(msg);
                await report("failure", msg);
                return;
              }

              const msg =
                "Missing changelog label. Use a conventional-commit title " +
                "(feat/fix/perf/docs/chore/ci/build/refactor/test/style, or " +
                "add ! for a break) or add one changelog/* label manually.";
              core.warning(msg);
              await report("failure", msg);
            } catch (error) {
              // On an unexpected error, fail loudly and leave the required
              // status red rather than silently passing.
              core.setFailed(error.message);
              await report("error", `Workflow error: ${error.message}`).catch(
                () => {},
              );
            }
