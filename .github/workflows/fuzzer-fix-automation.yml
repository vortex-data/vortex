name: Fuzzer Fix Automation

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to analyze and fix"
        required: true
        type: number
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number to analyze and fix"
        required: true
        type: number

jobs:
  attempt-fix:
    name: "Attempt to Fix Fuzzer Crash"
    # Only run when:
    # 1. Issue is opened with 'fuzzer' label, OR
    # 2. 'fuzzer' label is added to existing issue, OR
    # 3. Manually triggered via workflow_dispatch, OR
    # 4. Called from another workflow (workflow_call)
    if: |
      github.event_name == 'workflow_call' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'fuzzer')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'fuzzer')

    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch issue details (for workflow_dispatch/workflow_call)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        id: fetch_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_DATA=$(gh issue view ${{ inputs.issue_number }} --repo ${{ github.repository }} --json number,title,body,labels)
          echo "issue_number=${{ inputs.issue_number }}" >> $GITHUB_OUTPUT
          echo "issue_title=$(echo "$ISSUE_DATA" | jq -r '.title')" >> $GITHUB_OUTPUT
          echo "issue_body<<EOF" >> $GITHUB_OUTPUT
          echo "$ISSUE_DATA" | jq -r '.body' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          toolchain: nightly

      - name: Install llvm
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm

      - name: Install cargo fuzz
        run: cargo install --locked cargo-fuzz

      - name: Extract crash details from issue
        id: extract
        shell: bash
        run: |
          # Use fetched issue body for workflow_dispatch/workflow_call, otherwise use event issue body
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            cat > issue_body.txt <<'ISSUE_EOF'
          ${{ steps.fetch_issue.outputs.issue_body }}
          ISSUE_EOF
          else
            cat > issue_body.txt <<'ISSUE_EOF'
          ${{ github.event.issue.body }}
          ISSUE_EOF
          fi

          # Extract target name from issue body
          TARGET=$(grep -oP '(?<=\*\*Target\*\*: `)[^`]+' issue_body.txt || echo "file_io")
          echo "target=$TARGET" >> $GITHUB_OUTPUT

          # Extract crash file name
          CRASH_FILE=$(grep -oP '(?<=\*\*Crash File\*\*: `)[^`]+' issue_body.txt || echo "")
          echo "crash_file=$CRASH_FILE" >> $GITHUB_OUTPUT

          # Extract artifact URL
          ARTIFACT_URL=$(grep -oP 'https://[^\s]+/artifacts/[0-9]+' issue_body.txt | head -1 || echo "")
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT

          echo "Extracted: target=$TARGET, crash_file=$CRASH_FILE"
          rm -f issue_body.txt

      - name: Validate issue details
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.issue_number || github.event.issue.number }}"

          # Check if issue exists and has fuzzer label
          ISSUE_LABELS=$(gh issue view "$ISSUE_NUM" --repo ${{ github.repository }} --json labels --jq '.labels[].name')

          if ! echo "$ISSUE_LABELS" | grep -q "fuzzer"; then
            echo "❌ Issue #$ISSUE_NUM does not have 'fuzzer' label"
            exit 1
          fi

          echo "✅ Issue #$ISSUE_NUM has 'fuzzer' label"

          # Check if we have required crash details
          if [ -z "${{ steps.extract.outputs.crash_file }}" ]; then
            echo "❌ Could not extract crash file name from issue"
            exit 1
          fi

          if [ -z "${{ steps.extract.outputs.artifact_url }}" ]; then
            echo "❌ Could not extract artifact URL from issue"
            exit 1
          fi

          echo "✅ Extracted crash details: target=${{ steps.extract.outputs.target }}, crash_file=${{ steps.extract.outputs.crash_file }}"

      - name: Download and verify crash artifact
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract run ID from artifact URL
          ARTIFACT_URL="${{ steps.extract.outputs.artifact_url }}"
          RUN_ID=$(echo "$ARTIFACT_URL" | grep -oP 'runs/\K[0-9]+')
          ARTIFACT_ID=$(echo "$ARTIFACT_URL" | grep -oP 'artifacts/\K[0-9]+')

          echo "Downloading artifact $ARTIFACT_ID from run $RUN_ID"

          # Download the artifact
          gh run download "$RUN_ID" --name "${{ steps.extract.outputs.target }}-fuzzing-crash-artifacts" --repo ${{ github.repository }}

          # Verify crash file exists
          CRASH_FILE_PATH="${{ steps.extract.outputs.target }}/${{ steps.extract.outputs.crash_file }}"
          if [ ! -f "$CRASH_FILE_PATH" ]; then
            echo "❌ Crash file not found: $CRASH_FILE_PATH"
            ls -la "${{ steps.extract.outputs.target }}/" || true
            exit 1
          fi

          echo "✅ Downloaded crash file: $CRASH_FILE_PATH"
          echo "crash_file_path=$CRASH_FILE_PATH" >> $GITHUB_OUTPUT

      - name: Build fuzzer target
        id: build
        run: |
          echo "Building fuzzer target: ${{ steps.extract.outputs.target }}"

          # Build the fuzzer target to ensure it compiles
          if cargo +nightly fuzz build --sanitizer=none "${{ steps.extract.outputs.target }}" 2>&1 | tee fuzzer_build.log; then
            echo "✅ Fuzzer target built successfully"
            echo "build_success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Fuzzer target failed to build"
            echo "build_success=false" >> $GITHUB_OUTPUT

            # Show the build errors
            echo "Build errors:"
            tail -50 fuzzer_build.log
            exit 1
          fi

      - name: Reproduce crash
        id: reproduce
        continue-on-error: true
        run: |
          echo "Attempting to reproduce crash with fuzzer..."

          # Run fuzzer with crash file (no sanitizer, full backtrace for debugging)
          RUST_BACKTRACE=full timeout 30s cargo +nightly fuzz run --sanitizer=none "${{ steps.extract.outputs.target }}" "${{ steps.download.outputs.crash_file_path }}" -- -runs=1 2>&1 | tee crash_reproduction.log

          FUZZ_EXIT_CODE=${PIPESTATUS[0]}

          if [ $FUZZ_EXIT_CODE -eq 0 ]; then
            echo "⚠️  Fuzzer did not crash - may have been fixed already"
            echo "crash_reproduced=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Crash reproduced (exit code: $FUZZ_EXIT_CODE)"
            echo "crash_reproduced=true" >> $GITHUB_OUTPUT
          fi

      - name: Check if crash still exists
        if: steps.reproduce.outputs.crash_reproduced == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.issue_number || github.event.issue.number }}"

          gh issue comment "$ISSUE_NUM" --repo ${{ github.repository }} --body "## 🤖 Automated Analysis

          I attempted to reproduce this crash but the fuzzer completed successfully without crashing.

          **This likely means the issue has already been fixed.**

          ### Verification Steps

          I ran:
          \`\`\`bash
          cargo +nightly fuzz run --sanitizer=none ${{ steps.extract.outputs.target }} ${{ steps.download.outputs.crash_file_path }} -- -runs=1
          \`\`\`

          The fuzzer exited with code 0 (success).

          ### Next Steps

          - Verify if a recent commit fixed this issue
          - If confirmed fixed, close this issue
          - If not fixed, the crash may be non-deterministic and requires further investigation"

          echo "Crash could not be reproduced - skipping fix attempt"
          exit 0

      - name: Attempt to fix crash with Claude
        if: steps.reproduce.outputs.crash_reproduced == 'true'
        env:
          ISSUE_NUMBER: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.issue_number || github.event.issue.number }}
          ISSUE_TITLE: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && steps.fetch_issue.outputs.issue_title || github.event.issue.title }}
          ISSUE_BODY: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && steps.fetch_issue.outputs.issue_body || github.event.issue.body }}
          TARGET: ${{ steps.extract.outputs.target }}
          CRASH_FILE: ${{ steps.extract.outputs.crash_file }}
          CRASH_FILE_PATH: ${{ steps.download.outputs.crash_file_path }}
          ARTIFACT_URL: ${{ steps.extract.outputs.artifact_url }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          prompt: |
            # Fuzzer Crash Fix Automation

            You are analyzing a fuzzer-detected crash to attempt an automated fix. This issue was created by our fuzzing automation.

            ## Your Mission

            1. **Download and reproduce the crash**
            2. **Analyze the root cause** using the stack trace and source code
            3. **Create a fix** if the issue is straightforward
            4. **Write regression tests** that would fail without your fix
            5. **Verify the fix** by running the fuzzer and tests
            6. **Post your findings** as a comment on the issue

            ## Issue Details

            - **Issue**: #${{ env.ISSUE_NUMBER }}
            - **Title**: ${{ env.ISSUE_TITLE }}
            - **Target**: ${{ env.TARGET }}
            - **Crash File**: ${{ env.CRASH_FILE }}

            ## ✅ Pre-Validated Information

            **Good news!** The crash artifact has already been downloaded and the crash has been reproduced.

            - **Crash file location**: `${{ env.CRASH_FILE_PATH }}`
            - **Crash reproduction log**: `crash_reproduction.log`

            The crash has been confirmed to still exist on the current codebase, so you can proceed with analysis and fixing.

            ## Step 1: Analyze the Crash

            Read the crash reproduction log to see the actual crash output:

            ```bash
            cat crash_reproduction.log
            ```

            This will show you the panic message, stack trace, and any debug output.

            ## Step 2: Analyze the Root Cause

            1. Read the **Stack Trace** from the crash reproduction log
            2. Identify the **Crash Location** (file and line)
            3. Read the source code at that location
            4. Understand what input caused the crash (check the Debug Output in the issue)
            5. Determine the root cause:
               - Bounds check missing?
               - Invalid assumption?
               - Edge case not handled?
               - Integer overflow?
               - etc.

            ## Step 3: Assess Fixability

            Determine if this is something you can fix:

            **CAN FIX** (straightforward):
            - Missing bounds check
            - Missing validation
            - Edge case handling
            - Simple panic that should be an error
            - Off-by-one error

            **CANNOT FIX** (needs human):
            - Architectural issues
            - Complex logic errors
            - Requires domain knowledge
            - Multiple files/modules affected
            - Unclear requirements

            ## Step 4: If Fixable - Create the Fix

            1. **Modify the source code** to fix the issue
            2. **Add validation** or bounds checks as needed
            3. **Handle the edge case** properly
            4. **Follow the project's code style** (see CLAUDE.md)
            5. **Keep changes minimal** - only fix the specific issue

            ## Step 5: Write Regression Tests

            Create tests that:
            1. **Would fail before your fix** (reproduce the crash)
            2. **Pass after your fix** (verify it's solved)
            3. **Use the crash file as input** (the actual fuzzer input that triggered it)
            4. **Are placed in the right location** (near the code being tested)

            Example structure:
            ```rust
            #[test]
            fn test_fuzzer_crash_issue_${{ env.ISSUE_NUMBER }}() {
                // This test reproduces the crash from issue #${{ env.ISSUE_NUMBER }}
                // The fuzzer discovered this input that caused a panic

                let input = /* minimal reproducing input */;

                // This should not panic
                let result = function_that_crashed(input);

                // Assert the expected behavior
                assert!(result.is_ok() || result.is_err()); // depending on expected outcome
            }
            ```

            ## Step 6: Verify Your Fix

            1. Run the new regression test:
            ```bash
            cargo test test_fuzzer_crash_issue_${{ env.ISSUE_NUMBER }}
            ```

            2. Run the fuzzer with the crash file (with full backtrace):
            ```bash
            RUST_BACKTRACE=full cargo +nightly fuzz run --sanitizer=none ${{ env.TARGET }} ${{ env.CRASH_FILE_PATH }} -- -runs=100
            ```

            3. Run related tests:
            ```bash
            cargo test --package <affected-package>
            ```

            4. Check for lint issues:
            ```bash
            cargo clippy --all-targets --all-features
            ```

            5. Format code:
            ```bash
            cargo +nightly fmt --all
            ```

            ## Step 7: Post Your Analysis

            Comment on issue #${{ env.ISSUE_NUMBER }} with your findings:

            ### If You Created a Fix:

            ```markdown
            ## 🤖 Automated Fix Attempt

            I've analyzed this crash and created a potential fix.

            ### Root Cause Analysis

            [Explain what caused the crash in 2-3 sentences]

            ### The Fix

            **Modified files:**
            - `path/to/file.rs` - [brief description of changes]

            **Key changes:**
            - [Bullet point summary of what you changed]

            ### Regression Tests

            Created test(s):
            - `test_fuzzer_crash_issue_${{ env.ISSUE_NUMBER }}()` in `path/to/test.rs`

            **Test verification:**
            ```
            [Output from running the test]
            ```

            ### Verification

            ✅ Regression test passes
            ✅ Fuzzer no longer crashes on the input
            ✅ Related tests pass
            ✅ Clippy checks pass
            ✅ Code formatted

            ### Next Steps

            Please review the fix and:
            1. Verify the logic is correct
            2. Check if additional edge cases should be handled
            3. Consider if this fix should be applied elsewhere
            4. Merge if satisfactory or provide feedback

            **Note**: This is an automated fix attempt. Please review carefully before merging.
            ```

            Use the `gh issue comment` command to post this.

            ### If You Cannot Fix It:

            ```markdown
            ## 🤖 Automated Analysis

            I've analyzed this crash but cannot create an automated fix.

            ### Root Cause Analysis

            [Explain what caused the crash]

            ### Why I Can't Fix It

            [Explain why this needs human intervention - e.g., architectural issue, requires domain knowledge, etc.]

            ### Suggested Approach

            [Provide suggestions for how a human might fix this:
            - What code needs to change
            - What validation might be needed
            - Potential approaches to consider]

            ### Reproduction Verified

            [If you were able to reproduce it, confirm here]

            **Note**: This issue requires human analysis and fixing.
            ```

            ## Important Guidelines

            - **Be conservative**: Only create fixes for straightforward issues
            - **Minimal changes**: Don't refactor, just fix the specific bug
            - **Test thoroughly**: Your regression tests must actually catch the bug
            - **Follow CLAUDE.md**: Use project conventions
            - **Comment your reasoning**: Help reviewers understand the fix
            - **Don't commit yet**: Post your analysis first for review

            ## Available Tools

            You have access to:
            - Full repository source code (Read/Write/Edit)
            - Cargo toolchain (build, test, clippy, fmt, fuzz)
            - Git operations (for creating branches if requested)
            - GitHub CLI (for commenting on issues)

            ## Issue Body

            Here's the full issue body for reference:

            ```
            ${{ env.ISSUE_BODY }}
            ```

            ## Start Here

            Begin by reading the issue body carefully to extract:
            1. The stack trace
            2. The crash location
            3. The error message
            4. The artifact download URL
            5. Any debug output

            Then proceed with your analysis. Good luck! 🚀
          claude_args: |
            --model claude-opus-4-20250514
            --max-turns 40
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(cargo:*),Bash(gh issue comment:*),Bash(gh run download:*),Bash(curl:*),Bash(find:*),Bash(ls:*),Bash(cat:*),Bash(RUST_BACKTRACE=*:*)"
