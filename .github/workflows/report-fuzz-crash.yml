name: Report Fuzz Crash

on:
  workflow_call:
    inputs:
      fuzz_target:
        required: true
        type: string
      crash_file:
        required: true
        type: string
      artifact_url:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      logs_artifact_name:
        required: true
        type: string
      branch:
        required: true
        type: string
      commit:
        required: true
        type: string
    outputs:
      issue_number:
        description: "The issue number created or updated"
        value: ${{ jobs.report.outputs.issue_number }}
    secrets:
      claude_code_oauth_token:
        required: true
      gh_token:
        required: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      issue_number: ${{ steps.create_issue.outputs.issue_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download fuzzer logs
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.logs_artifact_name }}
          path: ./logs

      - name: Download crash artifacts
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact_name }}
          path: ./crash_artifacts

      - name: Make scripts executable
        run: chmod +x .github/scripts/fuzzer/*.sh

      - name: Extract crash information
        id: extract
        run: |
          # Find the crash file
          CRASH_PATH="./crash_artifacts/${{ inputs.fuzz_target }}/${{ inputs.crash_file }}"
          if [[ ! -f "$CRASH_PATH" ]]; then
            # Try without target subdirectory
            CRASH_PATH=$(find ./crash_artifacts -name "${{ inputs.crash_file }}" -type f | head -1)
          fi

          .github/scripts/fuzzer/extract-crash-info.sh \
            ./logs/fuzz_output.log \
            "$CRASH_PATH" \
            crash_info.json

          # Export values for later steps
          echo "seed_hash=$(jq -r '.seed_hash' crash_info.json)" >> $GITHUB_OUTPUT
          echo "stack_hash=$(jq -r '.stack_trace_hash' crash_info.json)" >> $GITHUB_OUTPUT
          echo "message_hash=$(jq -r '.message_hash' crash_info.json)" >> $GITHUB_OUTPUT
          echo "panic_location=$(jq -r '.panic_location' crash_info.json)" >> $GITHUB_OUTPUT
          echo "panic_message=$(jq -r '.panic_message' crash_info.json)" >> $GITHUB_OUTPUT
          echo "error_variant=$(jq -r '.error_variant' crash_info.json)" >> $GITHUB_OUTPUT
          echo "crash_type=$(jq -r '.crash_type' crash_info.json)" >> $GITHUB_OUTPUT

          # Store stack trace for template (handle multiline)
          jq -r '.stack_frames | join("\n")' crash_info.json > stack_trace.txt

          # Extract debug output from log
          sed -n '/Output of .std::fmt::Debug.:/,/^[A-Z]/p' ./logs/fuzz_output.log | head -100 > debug_output.txt || echo "(no debug output)" > debug_output.txt

          echo "Crash info extracted:"
          cat crash_info.json

      - name: Fetch existing fuzzer issues
        run: |
          gh issue list --repo ${{ github.repository }} \
            --label fuzzer \
            --state open \
            --json number,title,body,url \
            --limit 100 > fuzzer_issues.json

          echo "Found $(jq length fuzzer_issues.json) open fuzzer issues"
        env:
          GH_TOKEN: ${{ secrets.gh_token }}

      - name: Run deduplication checks
        id: dedup
        run: |
          result=$(.github/scripts/fuzzer/check-duplicate.sh crash_info.json fuzzer_issues.json)
          echo "$result" > dedup_result.json

          echo "Dedup result:"
          cat dedup_result.json

          is_duplicate=$(echo "$result" | jq -r '.duplicate')
          echo "is_duplicate=$is_duplicate" >> $GITHUB_OUTPUT

          if [[ "$is_duplicate" == "true" ]]; then
            echo "issue_number=$(echo "$result" | jq -r '.issue_number')" >> $GITHUB_OUTPUT
            echo "match_check=$(echo "$result" | jq -r '.check')" >> $GITHUB_OUTPUT
            echo "match_confidence=$(echo "$result" | jq -r '.confidence')" >> $GITHUB_OUTPUT
            echo "match_reason=$(echo "$result" | jq -r '.reason')" >> $GITHUB_OUTPUT
          fi

      - name: Get Claude analysis
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          github_token: ${{ secrets.gh_token }}
          show_full_output: true
          prompt: |
            Analyze this fuzzer crash and provide a brief root cause analysis.

            ## Crash Information

            - **Target**: ${{ inputs.fuzz_target }}
            - **Panic Location**: ${{ steps.extract.outputs.panic_location }}
            - **Error Variant**: ${{ steps.extract.outputs.error_variant }}
            - **Panic Message**: ${{ steps.extract.outputs.panic_message }}

            ## Instructions

            1. Read the crash log at `logs/fuzz_output.log`
            2. Read the source code at the panic location to understand context
            3. Output ONLY a brief analysis (3-5 sentences) explaining:
               - What went wrong
               - The likely root cause
               - Which component is affected

            Do NOT create issues or run any gh commands. Just provide the analysis text.
            Output your analysis as plain text, no markdown formatting needed.
          claude_args: |
            --model claude-sonnet-4-5-20250929
            --max-turns 10
            --allowedTools "Read,Glob,Grep"

      - name: Prepare template variables
        id: template_vars
        run: |
          # Export all variables needed for template rendering
          {
            echo "FUZZ_TARGET=${{ inputs.fuzz_target }}"
            echo "CRASH_FILE=${{ inputs.crash_file }}"
            echo "CRASH_TYPE=${{ steps.extract.outputs.crash_type }}"
            echo "SEED_HASH=${{ steps.extract.outputs.seed_hash }}"
            echo "STACK_HASH=${{ steps.extract.outputs.stack_hash }}"
            echo "MESSAGE_HASH=${{ steps.extract.outputs.message_hash }}"
            echo "PANIC_LOCATION=${{ steps.extract.outputs.panic_location }}"
            echo "ERROR_VARIANT=${{ steps.extract.outputs.error_variant }}"
            echo "BRANCH=${{ inputs.branch }}"
            echo "COMMIT=${{ inputs.commit }}"
            echo "ARTIFACT_URL=${{ inputs.artifact_url }}"
          } >> template_vars.env

          # Handle multiline values separately
          echo "PANIC_MESSAGE<<EOF" >> template_vars.env
          echo "${{ steps.extract.outputs.panic_message }}" >> template_vars.env
          echo "EOF" >> template_vars.env

      - name: Create or update issue
        id: create_issue
        run: |
          # Load template variables
          set -a
          source template_vars.env
          set +a

          # Load multiline values
          export STACK_TRACE=$(cat stack_trace.txt)
          export DEBUG_OUTPUT=$(cat debug_output.txt)
          export CLAUDE_ANALYSIS="${{ steps.claude.outputs.response }}"

          # Handle duplicate case
          if [[ "${{ steps.dedup.outputs.is_duplicate }}" == "true" ]]; then
            export MATCH_CHECK="${{ steps.dedup.outputs.match_check }}"
            export MATCH_CONFIDENCE="${{ steps.dedup.outputs.match_confidence }}"
            export MATCH_REASON="${{ steps.dedup.outputs.match_reason }}"

            # Render comment template
            .github/scripts/fuzzer/render-template.sh \
              .github/scripts/fuzzer/fuzzer-crash-comment.template.md \
              comment_body.md

            # Post comment to existing issue
            gh issue comment ${{ steps.dedup.outputs.issue_number }} \
              --repo ${{ github.repository }} \
              --body-file comment_body.md

            echo "issue_number=${{ steps.dedup.outputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "action=commented" >> $GITHUB_OUTPUT
            echo "Posted comment to existing issue #${{ steps.dedup.outputs.issue_number }}"
          else
            # Render new issue template
            .github/scripts/fuzzer/render-template.sh \
              .github/scripts/fuzzer/fuzzer-crash.template.md \
              issue_body.md

            # Create new issue
            issue_url=$(gh issue create \
              --repo ${{ github.repository }} \
              --title "Fuzzing Crash: ${{ steps.extract.outputs.error_variant }} in ${{ inputs.fuzz_target }}" \
              --label "bug,fuzzer" \
              --body-file issue_body.md)

            issue_number=$(echo "$issue_url" | grep -oP '\d+$')
            echo "issue_number=$issue_number" >> $GITHUB_OUTPUT
            echo "action=created" >> $GITHUB_OUTPUT
            echo "Created new issue #$issue_number: $issue_url"
          fi
        env:
          GH_TOKEN: ${{ secrets.gh_token }}
