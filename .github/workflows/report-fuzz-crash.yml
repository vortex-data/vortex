name: Report Fuzz Crash

on:
  workflow_call:
    inputs:
      fuzz_target:
        required: true
        type: string
      crash_file:
        required: true
        type: string
      artifact_url:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      logs_artifact_name:
        required: true
        type: string
      branch:
        required: true
        type: string
      commit:
        required: true
        type: string
    outputs:
      issue_number:
        description: "The issue number created or updated"
        value: ${{ jobs.report.outputs.issue_number }}
    secrets:
      claude_code_oauth_token:
        required: true
      gh_token:
        required: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      issue_number: ${{ steps.create_issue.outputs.issue_number }}
    env:
      PYTHONPATH: .github/scripts/fuzzer
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download fuzzer logs
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.logs_artifact_name }}
          path: ./logs

      - name: Download crash artifacts
        uses: actions/download-artifact@v6
        with:
          name: ${{ inputs.artifact_name }}
          path: ./crash_artifacts

      - name: Extract crash information
        id: extract
        run: |
          # Find the crash file
          CRASH_PATH="./crash_artifacts/${{ inputs.fuzz_target }}/${{ inputs.crash_file }}"
          if [[ ! -f "$CRASH_PATH" ]]; then
            CRASH_PATH=$(find ./crash_artifacts -name "${{ inputs.crash_file }}" -type f | head -1)
          fi

          # Run Python extraction
          python3 -m python extract ./logs/fuzz_output.log "$CRASH_PATH" -o crash_info.json

          # Export values for later steps
          echo "seed_hash=$(jq -r '.seed_hash' crash_info.json)" >> $GITHUB_OUTPUT
          echo "stack_hash=$(jq -r '.stack_trace_hash' crash_info.json)" >> $GITHUB_OUTPUT
          echo "message_hash=$(jq -r '.message_hash' crash_info.json)" >> $GITHUB_OUTPUT
          echo "panic_location=$(jq -r '.panic_location' crash_info.json)" >> $GITHUB_OUTPUT
          echo "panic_message=$(jq -r '.panic_message' crash_info.json)" >> $GITHUB_OUTPUT
          echo "error_variant=$(jq -r '.error_variant' crash_info.json)" >> $GITHUB_OUTPUT
          echo "crash_type=$(jq -r '.crash_type' crash_info.json)" >> $GITHUB_OUTPUT

          # Store stack trace for template
          jq -r '.stack_frames | join("\n")' crash_info.json > stack_trace.txt

          # Extract debug output from log
          sed -n '/Output of .std::fmt::Debug.:/,/^[A-Z]/p' ./logs/fuzz_output.log | head -100 > debug_output.txt || echo "(no debug output)" > debug_output.txt

          echo "Crash info extracted:"
          cat crash_info.json

      - name: Fetch existing fuzzer issues
        run: |
          gh issue list --repo ${{ github.repository }} \
            --label fuzzer \
            --state open \
            --json number,title,body,url \
            --limit 100 > fuzzer_issues.json

          echo "Found $(jq length fuzzer_issues.json) open fuzzer issues"
        env:
          GH_TOKEN: ${{ secrets.gh_token }}

      - name: Run scripted deduplication checks
        id: dedup_scripted
        run: |
          python3 -m python check-duplicate crash_info.json fuzzer_issues.json > dedup_result.json

          echo "Scripted dedup result:"
          cat dedup_result.json

          is_duplicate=$(jq -r '.duplicate' dedup_result.json)
          echo "is_duplicate=$is_duplicate" >> $GITHUB_OUTPUT

          if [[ "$is_duplicate" == "true" ]]; then
            echo "issue_number=$(jq -r '.issue_number' dedup_result.json)" >> $GITHUB_OUTPUT
            echo "match_check=$(jq -r '.check' dedup_result.json)" >> $GITHUB_OUTPUT
            echo "match_confidence=$(jq -r '.confidence' dedup_result.json)" >> $GITHUB_OUTPUT
            echo "match_reason=$(jq -r '.reason' dedup_result.json)" >> $GITHUB_OUTPUT
          fi

      - name: Claude deduplication check
        id: dedup_claude
        if: steps.dedup_scripted.outputs.is_duplicate != 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          github_token: ${{ secrets.gh_token }}
          show_full_output: true
          prompt: |
            Check if this fuzzer crash is a duplicate of any existing issue.

            ## New Crash Information

            - **Target**: ${{ inputs.fuzz_target }}
            - **Panic Location**: ${{ steps.extract.outputs.panic_location }}
            - **Error Variant**: ${{ steps.extract.outputs.error_variant }}
            - **Panic Message**: ${{ steps.extract.outputs.panic_message }}
            - **Seed Hash**: ${{ steps.extract.outputs.seed_hash }}

            ## Instructions

            1. Read `fuzzer_issues.json` which contains all open fuzzer issues
            2. Read the crash log at `logs/fuzz_output.log` for full context
            3. Compare this crash to existing issues looking for:
               - Same component/module affected
               - Similar error patterns (ignore specific numbers)
               - Related stack traces
               - Same root cause manifesting differently

            4. Write your decision to `claude_dedup.json` in this exact format:
               - If duplicate: `{"duplicate": true, "issue_number": N, "reason": "explanation"}`
               - If new: `{"duplicate": false, "reason": "explanation"}`

            Be liberal - if there's ANY chance this is related to an existing issue, mark it as duplicate.
          claude_args: |
            --model claude-sonnet-4-5-20250929
            --max-turns 15
            --allowedTools "Read,Write,Glob,Grep"

      - name: Process Claude dedup result
        id: dedup
        run: |
          # Check if scripted checks found a duplicate
          if [[ "${{ steps.dedup_scripted.outputs.is_duplicate }}" == "true" ]]; then
            echo "is_duplicate=true" >> $GITHUB_OUTPUT
            echo "issue_number=${{ steps.dedup_scripted.outputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "match_check=${{ steps.dedup_scripted.outputs.match_check }}" >> $GITHUB_OUTPUT
            echo "match_confidence=${{ steps.dedup_scripted.outputs.match_confidence }}" >> $GITHUB_OUTPUT
            echo "match_reason=${{ steps.dedup_scripted.outputs.match_reason }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check Claude's result
          if [[ -f claude_dedup.json ]]; then
            echo "Claude dedup result:"
            cat claude_dedup.json

            is_dup=$(jq -r '.duplicate' claude_dedup.json)
            if [[ "$is_dup" == "true" ]]; then
              echo "is_duplicate=true" >> $GITHUB_OUTPUT
              echo "issue_number=$(jq -r '.issue_number' claude_dedup.json)" >> $GITHUB_OUTPUT
              echo "match_check=claude" >> $GITHUB_OUTPUT
              echo "match_confidence=medium" >> $GITHUB_OUTPUT
              echo "match_reason=$(jq -r '.reason' claude_dedup.json)" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # No duplicate found
          echo "is_duplicate=false" >> $GITHUB_OUTPUT

      - name: Get Claude analysis
        id: claude
        if: steps.dedup.outputs.match_check != 'seed_hash'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          github_token: ${{ secrets.gh_token }}
          show_full_output: true
          prompt: |
            Analyze this fuzzer crash and write a brief root cause analysis to `claude_analysis.txt`.

            ## Crash Information

            - **Target**: ${{ inputs.fuzz_target }}
            - **Panic Location**: ${{ steps.extract.outputs.panic_location }}
            - **Error Variant**: ${{ steps.extract.outputs.error_variant }}
            - **Panic Message**: ${{ steps.extract.outputs.panic_message }}

            ## Instructions

            1. Read the crash log at `logs/fuzz_output.log`
            2. Read the source code at the panic location to understand context
            3. Write a brief analysis (3-5 sentences) to `claude_analysis.txt` explaining:
               - What went wrong
               - The likely root cause
               - Which component is affected

            Do NOT create issues or run any gh commands.
            Write ONLY the analysis text to claude_analysis.txt, no markdown formatting.
          claude_args: |
            --model claude-sonnet-4-5-20250929
            --max-turns 10
            --allowedTools "Read,Write,Glob,Grep"

      - name: Ensure analysis file exists
        run: |
          if [[ ! -f claude_analysis.txt ]]; then
            echo "Analysis not available (Claude step skipped or failed)" > claude_analysis.txt
          fi

      - name: Create or update issue
        id: create_issue
        run: |
          # Set environment variables for template rendering
          export FUZZ_TARGET="${{ inputs.fuzz_target }}"
          export CRASH_FILE="${{ inputs.crash_file }}"
          export CRASH_TYPE="${{ steps.extract.outputs.crash_type }}"
          export SEED_HASH="${{ steps.extract.outputs.seed_hash }}"
          export STACK_HASH="${{ steps.extract.outputs.stack_hash }}"
          export MESSAGE_HASH="${{ steps.extract.outputs.message_hash }}"
          export PANIC_LOCATION="${{ steps.extract.outputs.panic_location }}"
          export ERROR_VARIANT="${{ steps.extract.outputs.error_variant }}"
          export PANIC_MESSAGE="${{ steps.extract.outputs.panic_message }}"
          export BRANCH="${{ inputs.branch }}"
          export COMMIT="${{ inputs.commit }}"
          export ARTIFACT_URL="${{ inputs.artifact_url }}"
          export STACK_TRACE="$(cat stack_trace.txt)"
          export DEBUG_OUTPUT="$(cat debug_output.txt)"
          export CLAUDE_ANALYSIS="$(cat claude_analysis.txt)"

          # Handle duplicate case
          if [[ "${{ steps.dedup.outputs.is_duplicate }}" == "true" ]]; then
            export MATCH_CHECK="${{ steps.dedup.outputs.match_check }}"
            export MATCH_CONFIDENCE="${{ steps.dedup.outputs.match_confidence }}"
            export MATCH_REASON="${{ steps.dedup.outputs.match_reason }}"

            # Render comment template
            python3 -m python render \
              .github/scripts/fuzzer/fuzzer-crash-comment.template.md \
              -o comment_body.md

            # Post comment to existing issue
            gh issue comment ${{ steps.dedup.outputs.issue_number }} \
              --repo ${{ github.repository }} \
              --body-file comment_body.md

            echo "issue_number=${{ steps.dedup.outputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "action=commented" >> $GITHUB_OUTPUT
            echo "Posted comment to existing issue #${{ steps.dedup.outputs.issue_number }}"
          else
            # Render new issue template
            python3 -m python render \
              .github/scripts/fuzzer/fuzzer-crash.template.md \
              -o issue_body.md

            # Create new issue
            issue_url=$(gh issue create \
              --repo ${{ github.repository }} \
              --title "Fuzzing Crash: ${{ steps.extract.outputs.error_variant }} in ${{ inputs.fuzz_target }}" \
              --label "bug,fuzzer" \
              --body-file issue_body.md)

            issue_number=$(echo "$issue_url" | grep -oP '\d+$')
            echo "issue_number=$issue_number" >> $GITHUB_OUTPUT
            echo "action=created" >> $GITHUB_OUTPUT
            echo "Created new issue #$issue_number: $issue_url"
          fi
        env:
          GH_TOKEN: ${{ secrets.gh_token }}
