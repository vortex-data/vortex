name: Publish Bench Server

on:
  push:
    branches: [develop]
    paths:
      - "benchmarks-website/server/**"
      - "vortex-bench/**"
      - "Cargo.lock"
      - ".github/workflows/publish-bench-server.yml"
  workflow_dispatch: { }

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./benchmarks-website/server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/vortex-bench-server:latest
            ghcr.io/${{ github.repository }}/vortex-bench-server:${{ github.sha }}
