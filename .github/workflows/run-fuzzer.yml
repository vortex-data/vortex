name: Run Fuzzer

on:
  workflow_call:
    inputs:
      fuzz_target:
        description: "The cargo fuzz binary target name (e.g., file_io, array_ops)"
        required: true
        type: string
      fuzz_name:
        description: "Display/storage name for this fuzz run. Defaults to fuzz_target if not set."
        required: false
        type: string
        default: ""
      max_time:
        description: "Maximum fuzzing time in seconds"
        required: false
        type: number
        default: 18000
      runner:
        description: "Runner name from .github-private runs-on.yml (e.g., arm64-medium, gpu)"
        required: false
        type: string
        default: "arm64-medium"
      runner_selector:
        description: "Optional full runs-on selector suffix after run id (e.g., family=g5/image=ubuntu24-gpu-x64)"
        required: false
        type: string
        default: ""
      extra_features:
        description: "Extra cargo features to enable (e.g., cuda)"
        required: false
        type: string
        default: ""
      extra_env:
        description: "Extra environment variables to set (space-separated KEY=VALUE pairs)"
        required: false
        type: string
        default: ""
      jobs:
        description: "Number of parallel fuzzing jobs (libfuzzer -fork=N). Set to match available vCPUs."
        required: false
        type: number
        default: 1
    outputs:
      crashes_found:
        description: "Whether crashes were found"
        value: ${{ jobs.fuzz.outputs.crashes_found }}
      first_crash_name:
        description: "Name of the first crash file"
        value: ${{ jobs.fuzz.outputs.first_crash_name }}
      artifact_url:
        description: "URL of the uploaded crash artifacts"
        value: ${{ jobs.fuzz.outputs.artifact_url }}
    secrets:
      R2_FUZZ_ACCESS_KEY_ID:
        required: true
      R2_FUZZ_SECRET_ACCESS_KEY:
        required: true

env:
  NIGHTLY_TOOLCHAIN: nightly-2026-02-05

jobs:
  fuzz:
    name: "Run ${{ inputs.fuzz_name || inputs.fuzz_target }}"
    env:
      FUZZ_NAME: ${{ inputs.fuzz_name || inputs.fuzz_target }}
    timeout-minutes: 370  # 6 hours 10 minutes
    runs-on: >-
      ${{ github.repository == 'vortex-data/vortex'
          && (inputs.runner_selector != ''
              && format('runs-on={0}/{1}/disk=large/tag={2}-fuzz', github.run_id, inputs.runner_selector, inputs.fuzz_name || inputs.fuzz_target)
              || format('runs-on={0}/runner={1}/disk=large/tag={2}-fuzz', github.run_id, inputs.runner, inputs.fuzz_name || inputs.fuzz_target))
          || 'ubuntu-latest' }}
    outputs:
      crashes_found: ${{ steps.check.outputs.crashes_found }}
      first_crash_name: ${{ steps.check.outputs.first_crash_name }}
      artifact_url: ${{ steps.upload_artifacts.outputs.artifact-url }}
    steps:
      - uses: runs-on/action@v2
        if: github.repository == 'vortex-data/vortex'
        with:
          sccache: s3

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: ./.github/actions/setup-rust
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}

      - name: Install llvm
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm

      - name: Install cargo-fuzz
        uses: taiki-e/cache-cargo-install-action@66c9585ef5ca780ee69399975a5e911f47905995
        with:
          tool: cargo-fuzz

      - name: Restore corpus
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_FUZZ_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_FUZZ_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"
          AWS_ENDPOINT_URL: "https://01e9655179bbec953276890b183039bc.r2.cloudflarestorage.com"
        run: |
          CORPUS_KEY="${FUZZ_NAME}_corpus.tar.zst"
          CORPUS_DIR="fuzz/corpus/${FUZZ_NAME}"

          # Try to download corpus
          if python3 scripts/s3-download.py "s3://vortex-fuzz-corpus/$CORPUS_KEY" "$CORPUS_KEY"; then
            echo "Downloaded corpus successfully"
            tar -xf "$CORPUS_KEY"
          else
            echo "Creating empty corpus directory"
            mkdir -p "$CORPUS_DIR"
          fi

      - name: Capture GPU diagnostics (pre-run)
        if: inputs.runner == 'gpu' || contains(inputs.extra_features, 'cuda')
        shell: bash
        run: |
          {
            echo "===== GPU diagnostics (pre-run) ====="
            echo "phase=pre-run"
            echo "timestamp=$(date -u --iso-8601=seconds)"
            echo "hostname=$(hostname)"
            echo "uname=$(uname -a)"
            echo "runner_name=${RUNNER_NAME:-<unset>}"
            echo "runner_os=${RUNNER_OS:-<unset>}"
            echo "runner_arch=${RUNNER_ARCH:-<unset>}"
            echo "github_ref=${GITHUB_REF:-<unset>}"
            echo "CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-<unset>}"
            echo "NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-<unset>}"
            echo
            echo "## CUDA/NVIDIA environment"
            env | sort | grep -E '^(CUDA|NVIDIA|LD_LIBRARY_PATH|LIBRARY_PATH|PATH=|CARGO_TARGET_|RUSTFLAGS|RUSTC_WRAPPER|ASAN_OPTIONS|UBSAN_OPTIONS|LSAN_OPTIONS|TSAN_OPTIONS)=' || true
            echo
            echo "## process limits"
            ulimit -a || true
            echo
            echo "## /proc/self/limits"
            cat /proc/self/limits || true
            echo
            echo "## /proc/self/cgroup"
            cat /proc/self/cgroup || true
            echo
            echo "## /proc/pressure/memory"
            cat /proc/pressure/memory || true
            echo
            echo "## host memory summary"
            free -h || true
            echo
            grep -E '^(MemTotal|MemFree|MemAvailable|SwapTotal|SwapFree|CommitLimit|Committed_AS):' /proc/meminfo || true
            echo
            echo "## disk summary"
            df -h || true
            echo
            echo "## nvcc location"
            which nvcc || true
            echo
            echo "## nvcc --version"
            nvcc --version || true
            echo
            echo "## ldconfig CUDA/NVIDIA libraries"
            ldconfig -p | grep -E 'libcuda|libcudart|libnvidia|libnvrtc|libnvJitLink' || true
            echo
            echo "## loaded NVIDIA kernel modules"
            lsmod | grep '^nvidia' || true
            echo
            echo "## NVIDIA device nodes"
            ls -l /dev/nvidia* /dev/dri/* || true
            echo
            echo "## /proc/driver/nvidia/version"
            cat /proc/driver/nvidia/version || true
            echo
            echo "## /proc/driver/nvidia/params"
            cat /proc/driver/nvidia/params || true
            echo
            echo "## /proc/driver/nvidia/gpus"
            for file in /proc/driver/nvidia/gpus/*/information /proc/driver/nvidia/gpus/*/power; do
              if [ -f "$file" ]; then
                echo "### $file"
                cat "$file"
                echo
              fi
            done
            echo
            echo "## nvidia-smi"
            nvidia-smi || true
            echo
            echo "## nvidia-smi -L"
            nvidia-smi -L || true
            echo
            echo "## nvidia-smi topo -m"
            nvidia-smi topo -m || true
            echo
            echo "## GPU detailed state"
            nvidia-smi -q -d Memory,Compute,Performance,Utilization || true
            echo
            echo "## GPU summary"
            nvidia-smi --query-gpu=index,uuid,name,driver_version,pci.bus_id,compute_mode,persistence_mode,pstate,memory.total,memory.used,memory.free,utilization.gpu,utilization.memory,temperature.gpu,power.draw,power.limit,clocks.current.graphics,clocks.current.memory --format=csv || true
            echo
            echo "## Active compute processes"
            nvidia-smi --query-compute-apps=gpu_uuid,pid,process_name,used_memory --format=csv,noheader || true
            echo
            echo "## Relevant processes"
            ps -Ao pid,ppid,pgid,etimes,rss,comm,args | grep -E 'cargo|fuzz|nvidia|cuda|runner|actions|runs-on' || true
            echo
          }

      - name: Run CUDA driver probe (pre-run)
        if: inputs.runner == 'gpu' || contains(inputs.extra_features, 'cuda')
        run: |
          cargo +$NIGHTLY_TOOLCHAIN run --quiet --package vortex-fuzz \
            --no-default-features --features native,cuda \
            --bin cuda_probe -- pre-run full || true

      - name: Run fuzzing target
        id: fuzz
        run: |
          FEATURES_FLAG=""
          if [ -n "${{ inputs.extra_features }}" ]; then
            FEATURES_FLAG="--features ${{ inputs.extra_features }}"
          fi
          FORK_FLAG=""
          if [ "${{ inputs.jobs }}" -gt 1 ]; then
            FORK_FLAG="-fork=${{ inputs.jobs }}"
          fi
          ${{ inputs.extra_env }} RUST_BACKTRACE=1 \
            cargo +$NIGHTLY_TOOLCHAIN fuzz run --release --debug-assertions \
            $FEATURES_FLAG \
            ${{ inputs.fuzz_target }} -- \
            $FORK_FLAG -max_total_time=${{ inputs.max_time }} -rss_limit_mb=0 \
            2>&1 | tee -a fuzz_output.log
        continue-on-error: true

      - name: Capture GPU diagnostics (post-run)
        if: always() && (inputs.runner == 'gpu' || contains(inputs.extra_features, 'cuda'))
        shell: bash
        run: |
          {
            echo "===== GPU diagnostics (post-run) ====="
            echo "phase=post-run"
            echo "timestamp=$(date -u --iso-8601=seconds)"
            echo "hostname=$(hostname)"
            echo "uname=$(uname -a)"
            echo "runner_name=${RUNNER_NAME:-<unset>}"
            echo "runner_os=${RUNNER_OS:-<unset>}"
            echo "runner_arch=${RUNNER_ARCH:-<unset>}"
            echo "github_ref=${GITHUB_REF:-<unset>}"
            echo "CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-<unset>}"
            echo "NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-<unset>}"
            echo
            echo "## process limits"
            ulimit -a || true
            echo
            echo "## /proc/self/limits"
            cat /proc/self/limits || true
            echo
            echo "## /proc/self/cgroup"
            cat /proc/self/cgroup || true
            echo
            echo "## /proc/pressure/memory"
            cat /proc/pressure/memory || true
            echo
            echo "## host memory summary"
            free -h || true
            echo
            grep -E '^(MemTotal|MemFree|MemAvailable|SwapTotal|SwapFree|CommitLimit|Committed_AS):' /proc/meminfo || true
            echo
            echo "## nvidia-smi"
            nvidia-smi || true
            echo
            echo "## nvidia-smi topo -m"
            nvidia-smi topo -m || true
            echo
            echo "## GPU detailed state"
            nvidia-smi -q -d Memory,Compute,Performance,Utilization || true
            echo
            echo "## GPU summary"
            nvidia-smi --query-gpu=index,uuid,name,driver_version,pci.bus_id,compute_mode,persistence_mode,pstate,memory.total,memory.used,memory.free,utilization.gpu,utilization.memory,temperature.gpu,power.draw,power.limit,clocks.current.graphics,clocks.current.memory --format=csv || true
            echo
            echo "## Active compute processes"
            nvidia-smi --query-compute-apps=gpu_uuid,pid,process_name,used_memory --format=csv,noheader || true
            echo
            echo "## Relevant processes"
            ps -Ao pid,ppid,pgid,etimes,rss,comm,args | grep -E 'cargo|fuzz|nvidia|cuda|runner|actions|runs-on' || true
            echo
          }

      - name: Run CUDA driver probe (post-run)
        if: always() && (inputs.runner == 'gpu' || contains(inputs.extra_features, 'cuda'))
        run: |
          cargo +$NIGHTLY_TOOLCHAIN run --quiet --package vortex-fuzz \
            --no-default-features --features native,cuda \
            --bin cuda_probe -- post-run full || true

      - name: Check for crashes
        id: check
        run: |
          # Find actual crash files, not just the directory structure
          FIRST_CRASH=$(find fuzz/artifacts -type f \( -name "crash-*" -o -name "leak-*" -o -name "timeout-*" -o -name "oom-*" \) 2>/dev/null | head -1 || true)

          if [ -n "$FIRST_CRASH" ]; then
            echo "crashes_found=true" >> $GITHUB_OUTPUT
            echo "first_crash=$FIRST_CRASH" >> $GITHUB_OUTPUT
            echo "first_crash_name=$(basename $FIRST_CRASH)" >> $GITHUB_OUTPUT

            # Count all crashes for reporting
            CRASH_COUNT=$(find fuzz/artifacts -type f \( -name "crash-*" -o -name "leak-*" -o -name "timeout-*" -o -name "oom-*" \) | wc -l)
            echo "crash_count=$CRASH_COUNT" >> $GITHUB_OUTPUT
            echo "Found $CRASH_COUNT crash(es), will process first: $(basename $FIRST_CRASH)"
          else
            echo "crashes_found=false" >> $GITHUB_OUTPUT
            echo "crash_count=0" >> $GITHUB_OUTPUT
            echo "No crashes found"
          fi

      - name: Reproduce crash for full output
        if: steps.check.outputs.crashes_found == 'true' && inputs.jobs > 1
        run: |
          # In fork mode, child output (backtrace, panic message) is not captured in
          # fuzz_output.log. Replay the crashing input in single-process mode to get
          # the full output for the crash reporting pipeline.
          FEATURES_FLAG=""
          if [ -n "${{ inputs.extra_features }}" ]; then
            FEATURES_FLAG="--features ${{ inputs.extra_features }}"
          fi
          RUST_BACKTRACE=1 \
            cargo +$NIGHTLY_TOOLCHAIN fuzz run --release --debug-assertions \
            $FEATURES_FLAG \
            ${{ inputs.fuzz_target }} \
            "${{ steps.check.outputs.first_crash }}" \
            2>&1 | tee -a fuzz_output.log || true

      - name: Archive crash artifacts
        id: upload_artifacts
        if: steps.check.outputs.crashes_found == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ env.FUZZ_NAME }}-crash-artifacts
          path: fuzz/artifacts
          retention-days: 180

      - name: Archive fuzzer output log
        if: steps.check.outputs.crashes_found == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ env.FUZZ_NAME }}-logs
          path: fuzz_output.log
          retention-days: 90

      - name: Merge and persist corpus
        if: always()
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_FUZZ_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_FUZZ_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"
          AWS_ENDPOINT_URL: "https://01e9655179bbec953276890b183039bc.r2.cloudflarestorage.com"
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/develop" ]; then
            echo "Skipping corpus upload for ${GITHUB_REF}; only develop updates the shared fuzz corpus."
            exit 0
          fi
          python3 scripts/s3-corpus-merge-upload.py \
            --bucket vortex-fuzz-corpus \
            --key "${FUZZ_NAME}_corpus.tar.zst" \
            --corpus-dir "fuzz/corpus/${FUZZ_NAME}" \
            --checksum-algorithm CRC32

      - name: Fail job if fuzz run found a bug
        if: steps.check.outputs.crashes_found == 'true'
        run: exit 1
