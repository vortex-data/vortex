name: CI (fork)

on:
  pull_request: { }

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: auto

jobs:
  rust-fmt:
    name: Rust (fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rust format
        run: cargo +nightly fmt --all --check

  rust-clippy:
    name: Rust (clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rust clippy (workspace)
        run: >
          cargo clippy --locked --workspace --all-features --all-targets
          --exclude vortex-bench
          --exclude vortex-python
          --exclude vortex-duckdb
          --exclude vortex-fuzz
          --exclude duckdb-bench
          --exclude lance-bench
          --exclude datafusion-bench
          --exclude random-access-bench
          --exclude compress-bench
          -- -D warnings

  rust-tests:
    name: Rust (tests)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Cargo nextest
        run: >
          cargo nextest run --locked --workspace --all-features --no-fail-fast
          --exclude vortex-cuda
          --exclude vortex-bench
          --exclude vortex-python
          --exclude vortex-duckdb
          --exclude vortex-fuzz
          --exclude duckdb-bench
          --exclude lance-bench
          --exclude datafusion-bench
          --exclude random-access-bench
          --exclude compress-bench
