---
# Reusable workflow: run the benchmark regression monitor after each benchmark suite.
# Called from bench.yml and sql-benchmarks.yml after results are produced.

name: "Benchmark regression monitor"

on:
  workflow_call:
    inputs:
      benchmark_id:
        required: true
        type: string
        description: "Benchmark suite identifier (e.g. tpch-nvme, compress-bench)"
      results_path:
        required: false
        type: string
        default: "results.json"
        description: "Path to the newline-delimited JSON results file"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: "arn:aws:iam::245040174862:role/GitHubBenchmarkRole"
          aws-region: us-east-1

      - name: Download commits and history
        shell: bash
        run: |
          set -Eeu -o pipefail -x
          aws s3 cp s3://vortex-ci-benchmark-results/commits.json commits.json
          mkdir -p benchmark-history
          aws s3 cp \
            "s3://vortex-ci-benchmark-results/monitor-history/${{ inputs.benchmark_id }}.json" \
            "benchmark-history/${{ inputs.benchmark_id }}.json" \
            || echo "No existing history — starting fresh."

      - name: Run benchmark monitor
        id: monitor
        shell: bash
        run: |
          set -Eeu -o pipefail -x
          uv run --no-project scripts/benchmark_monitor.py \
            --history-dir ./benchmark-history \
            --commits commits.json \
            --results "${{ inputs.results_path }}" \
            --benchmark-id "${{ inputs.benchmark_id }}" \
            --current-commit "${{ github.sha }}" \
            --webhook-url "${{ secrets.INCIDENT_IO_WEBHOOK_URL }}" \
          || echo "monitor_exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload updated history
        if: always()
        shell: bash
        run: |
          set -Eeu -o pipefail -x
          aws s3 cp \
            "benchmark-history/${{ inputs.benchmark_id }}.json" \
            "s3://vortex-ci-benchmark-results/monitor-history/${{ inputs.benchmark_id }}.json"
