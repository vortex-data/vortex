name: Publish Dry Run
on:
  schedule:
    - cron: "30 1 * * 1"
  workflow_dispatch:

jobs:
  rust-publish-dry-run:
    timeout-minutes: 120
    runs-on:
      - runs-on=${{ github.run_id }}
      - family=m7i+m7i-flex+m7a
      - cpu=8
      - image=ubuntu24-full-x64
      - extras=s3-cache
      - tag=rust-publish-dry-run
    steps:
      - uses: runs-on/action@v2
        with:
          sccache: s3
      - uses: actions/checkout@v6
      - id: setup-rust
        uses: ./.github/actions/setup-rust
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cargo Set Version
        run: |
          # Match publish toolchain
          cargo install cargo-edit
          # This is mostly a dummy version, we don't actually publish anything but it cannot exist in crates.io
          cargo set-version --workspace 0.100000.0
      - name: Test Release
        run: |
          cargo publish --dry-run --no-verify --allow-dirty --workspace

      - name: Alert incident.io on dry run publish failure
        if: failure()
        uses: ./.github/actions/alert-incident-io
        with:
          api-key: ${{ secrets.incident_io_alert_token }}
          alert-title: "Publish dry run failed"
          alert-description: |
            Rust publish dry run failed
          deduplication-key: rust-publish-dry-run-failed
