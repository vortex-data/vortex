name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' }}

on:
  push:
    branches: ["develop"]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read
  checks: write # audit-check creates checks
  issues: write # audit-check creates issues

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  bench-codspeed:
    name: Benchmark with Codspeed
    runs-on:
      - runs-on=${{ github.run_id }}
      - family=m7i.2xlarge
      - image=ubuntu24-full-x64
      - extras=s3-cache

    steps:
      - uses: runs-on/action@v1
        with:
          show-env: true
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Configure Git to use CLI
        run: |
          mkdir -p ~/.cargo
          echo '[net]' >> ~/.cargo/config.toml
          echo 'git-fetch-with-cli = true' >> ~/.cargo/config.toml

      - name: Install Codspeed
        shell: bash
        run: cargo install --force cargo-codspeed --git https://github.com/spiraldb/codspeed-rust.git --no-default-features --locked --bin cargo-codspeed
      - name: Build benchmarks
        env:
          RUSTFLAGS: "-C target-cpu=native"
        run: |
          cargo codspeed build --features test-harness \
            --exclude bench-vortex \
            --exclude vortex-datafusion \
            --exclude vortex-tui \
            --exclude vortex-fuzz \
            --exclude pyvortex \
            --exclude xtask \
            --workspace \
            --profile bench

      - name: Run benchmarks
        run: |
          cargo codspeed run
          token: ${{ secrets.CODSPEED_TOKEN }}
