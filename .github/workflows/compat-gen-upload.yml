# Reusable workflow: generate compat fixtures, attest, and upload to S3.
#
# Called by:
#   - compat-gen-find-release.yml (manual hotfix with approval)
#   - publish.yml (post-release)

name: Compat Fixture Upload

on:
  workflow_call:
    inputs:
      version:
        description: "Version to generate fixtures for (e.g. 0.62.0)"
        required: true
        type: string

env:
  VERSION: ${{ inputs.version }}

jobs:
  generate-fixtures:
    name: "Generate fixtures (v${{ inputs.version }})"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ inputs.version }}"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Generate fixtures
        run: |
          cargo run -p vortex-compat --release --bin compat-gen -- \
            --version "$VERSION" \
            --output /tmp/compat-fixtures/

      - name: Validate manifest (dry-run merge)
        run: |
          python3 vortex-test/compat-gen/scripts/upload.py \
            --version "$VERSION" \
            --output /tmp/compat-fixtures/ \
            --skip-build \
            --dry-run

      - name: Create fixture archive
        run: |
          tar -czf "/tmp/compat-fixtures-${VERSION}.tar.gz" \
            -C /tmp/compat-fixtures .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: /tmp/compat-fixtures-${{ inputs.version }}.tar.gz

      - name: Upload fixture artifact
        uses: actions/upload-artifact@v4
        with:
          name: compat-fixtures-${{ inputs.version }}
          path: /tmp/compat-fixtures-${{ inputs.version }}.tar.gz

  upload-to-s3:
    name: "Upload to S3 (v${{ inputs.version }})"
    needs: [generate-fixtures]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ inputs.version }}"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: "arn:aws:iam::245040174862:role/GitHubBenchmarkRole"
          aws-region: us-east-1

      - name: Generate and upload fixtures
        run: |
          python3 vortex-test/compat-gen/scripts/upload.py \
            --version "$VERSION"
