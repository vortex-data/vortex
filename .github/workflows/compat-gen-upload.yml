name: Compat Fixture Upload

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to publish fixtures from (e.g. v0.62.0). Defaults to HEAD."
        required: false
        default: ""

jobs:
  upload-fixtures:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::245040174862:role/GitHubBenchmarkRole
          aws-region: us-east-1

      - name: Generate and publish fixtures
        run: |
          args="publish"
          if [ -n "${{ inputs.git_ref }}" ]; then
            args="$args --git-ref ${{ inputs.git_ref }}"
          fi
          python vortex-test/compat-gen/scripts/compat.py $args
