jobs:
  bench:
    timeout-minutes: 120
    env:
      VORTEX_EXPERIMENTAL_PATCHED_ARRAY: "1"
      FLAT_LAYOUT_INLINE_ARRAY_NODE: "1"
      # Makes python output nicer
      COLUMNS: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.benchmark_profile == 'base' && inputs.base_benchmark_matrix || inputs.benchmark_matrix) }}

    runs-on: >-
      ${{ github.repository == 'vortex-data/vortex'
          && format('runs-on={0}/runner=bench-dedicated/instance-type={1}/tag={2}{3}', github.run_id, inputs.machine_type, matrix.id, (inputs.mode != 'pr' || github.event.pull_request.head.repo.fork == false) && '/extras=s3-cache' || '')
          || 'ubuntu-latest' }}
    steps:
      - uses: runs-on/action@v2
        if: inputs.mode != 'pr' || github.event.pull_request.head.repo.fork == false
        with:
          sccache: s3
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        if: inputs.mode == 'pr'
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        if: inputs.mode != 'pr'
      - name: Setup benchmark environment
        run: sudo bash scripts/setup-benchmark.sh
      - uses: ./.github/actions/setup-rust
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install uv
        uses: spiraldb/actions/.github/actions/setup-uv@a746510eafaa926484c354541cfc49b2ec06cc63  # 0.18.6
        with:
          sync: false

      - name: Install DuckDB
        run: |
          wget -qO- https://github.com/duckdb/duckdb/releases/download/v1.5.3/duckdb_cli-linux-amd64.zip | funzip > duckdb
          chmod +x duckdb
          echo "$PWD" >> "$GITHUB_PATH"

      - uses: ./.github/actions/system-info

      - name: Resolve benchmark targets
        id: targets
        shell: bash
        run: |
          if [ "${{ inputs.mode }}" = "pr" ]; then
            targets='${{ toJSON(matrix.pr_targets) }}'
          else
            targets='${{ toJSON(matrix.develop_targets) }}'
          fi
          {
            echo 'targets_json<<__TARGETS_JSON__'
            echo "$targets"
            echo '__TARGETS_JSON__'
          } >> "$GITHUB_OUTPUT"

      - name: Build binaries
        shell: bash
        env:
          RUSTFLAGS: "-C target-cpu=native"
        run: |
          packages=(--bin data-gen --bin datafusion-bench --bin duckdb-bench)
          if [ "${{ inputs.mode }}" != "pr" ]; then
            packages+=(--bin lance-bench)
          fi
          cargo build "${packages[@]}" --profile release_debug --features unstable_encodings

      - name: Generate data
        shell: bash
        env:
          RUST_BACKTRACE: full
        run: |
          uv run --project bench-orchestrator vx-bench prepare-data "${{ matrix.subcommand }}" \
            --formats-json '${{ toJSON(matrix.data_formats) }}' \
            ${{ matrix.scale_factor && format('--opt scale-factor={0}', matrix.scale_factor) || '' }}

      - name: Setup AWS CLI
        if: inputs.mode != 'pr' || github.event.pull_request.head.repo.fork == false
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6
        with:
          role-to-assume: arn:aws:iam::245040174862:role/GitHubBenchmarkRole
          aws-region: us-east-1

      - name: Upload data
        if: matrix.remote_storage != null && (inputs.mode != 'pr' || github.event.pull_request.head.repo.fork == false)
        shell: bash
        env:
          AWS_REGION: "us-east-1"
        run: |
          aws s3 rm --recursive ${{ matrix.remote_storage }}
          aws s3 cp --recursive ${{matrix.local_dir}} ${{ matrix.remote_storage }}

      - name: Setup Polar Signals
        if: inputs.mode != 'pr' || github.event.pull_request.head.repo.fork == false
        uses: polarsignals/gh-actions-ps-profiling@68ae857e375a826606352016e5b90f01a2a7ff7a  # v0.8.1
        with:
          polarsignals_cloud_token: ${{ secrets.POLAR_SIGNALS_API_KEY }}
          labels: "branch=${{ github.ref_name }};gh_run_id=${{ github.run_id }};benchmark=${{ matrix.id }}"
          project_uuid: "e5d846e1-b54c-46e7-9174-8bf055a3af56"
          profiling_frequency: 199
          extra_args: "--off-cpu-threshold=0.03"  # Personally tuned by @brancz

      - name: Run ${{ matrix.name }} benchmark
        if: matrix.remote_storage == null || github.event.pull_request.head.repo.fork == true
        shell: bash
        env:
          OTEL_SERVICE_NAME: "vortex-bench"
          OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
          OTEL_EXPORTER_OTLP_ENDPOINT: "${{ (inputs.mode != 'pr' || github.event.pull_request.head.repo.fork == false) && secrets.OTEL_EXPORTER_OTLP_ENDPOINT || '' }}"
          OTEL_EXPORTER_OTLP_HEADERS: "${{ (inputs.mode != 'pr' || github.event.pull_request.head.repo.fork == false) && secrets.OTEL_EXPORTER_OTLP_HEADERS || '' }}"
          OTEL_RESOURCE_ATTRIBUTES: "bench-name=${{ matrix.id }}"
        run: |
          bash scripts/bench-taskset.sh uv run --project bench-orchestrator vx-bench run "${{ matrix.subcommand }}" \
            --targets-json '${{ steps.targets.outputs.targets_json }}' \
            --output results.json \
            --gh-json-v3 results.v3.jsonl \
            --no-build \
            --runner "ec2_${{ inputs.machine_type }}" \
            ${{ matrix.iterations && format('--iterations {0}', matrix.iterations) || '' }} \
            ${{ matrix.scale_factor && format('--opt scale-factor={0}', matrix.scale_factor) || '' }}

      - name: Run ${{ matrix.name }} benchmark (remote)
        if: matrix.remote_storage != null && (inputs.mode != 'pr' || github.event.pull_request.head.repo.fork == false)
        shell: bash
        env:
          AWS_REGION: "us-east-1"
          OTEL_SERVICE_NAME: "vortex-bench"
          OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
          OTEL_EXPORTER_OTLP_ENDPOINT: "${{ (inputs.mode != 'pr' || github.event.pull_request.head.repo.fork == false) && secrets.OTEL_EXPORTER_OTLP_ENDPOINT || '' }}"
          OTEL_EXPORTER_OTLP_HEADERS: "${{ (inputs.mode != 'pr' || github.event.pull_request.head.repo.fork == false) && secrets.OTEL_EXPORTER_OTLP_HEADERS || '' }}"
          OTEL_RESOURCE_ATTRIBUTES: "bench-name=${{ matrix.id }}"
        run: |
          bash scripts/bench-taskset.sh uv run --project bench-orchestrator vx-bench run "${{ matrix.subcommand }}" \
            --targets-json '${{ steps.targets.outputs.targets_json }}' \
            --output results.json \
            --gh-json-v3 results.v3.jsonl \
            --no-build \
            --runner "ec2_${{ inputs.machine_type }}" \
            ${{ matrix.iterations && format('--iterations {0}', matrix.iterations) || '' }} \
            --opt remote-data-dir=${{ matrix.remote_storage }} \
            ${{ matrix.scale_factor && format('--opt scale-factor={0}', matrix.scale_factor) || '' }}

      - name: Capture file sizes
        if: matrix.remote_storage == null
        shell: bash
        run: |
          uv run --no-project scripts/capture-file-sizes.py \
            vortex-bench/data \
            --benchmark ${{ matrix.subcommand }} \
            --commit ${{ inputs.mode == 'pr' && github.event.pull_request.head.sha || github.sha }} \
            -o sizes.json
          cat sizes.json >> results.json

      - name: Compare results
        if: inputs.mode == 'pr'
        shell: bash
        run: |
          set -Eeu -o pipefail -x

          python3 scripts/s3-download.py s3://vortex-ci-benchmark-results/data.json.gz data.json.gz --no-sign-request
          gzip -d -c data.json.gz > base.json

          echo "# Benchmarks: ${{ matrix.name }}" > comment.md
          echo '' >> comment.md
          uv run --no-project scripts/compare-benchmark-jsons.py base.json results.json "${{ matrix.name }}" \
            >> comment.md
          cat comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR
        if: inputs.mode == 'pr' && github.event.pull_request.head.repo.fork == false
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b  # v3
        with:
          file-path: comment.md
          # There is exactly one comment per comment-tag. If a comment with this tag already exists,
          # this action will *update* the comment instead of posting a new comment.
          comment-tag: bench-pr-comment-${{ matrix.id }}

      - name: Comment PR on failure
        if: failure() && inputs.mode == 'pr' && github.event.pull_request.head.repo.fork == false
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b  # v3
        with:
          message: |
            # 🚨🚨🚨❌❌❌ SQL BENCHMARK FAILED ❌❌❌🚨🚨🚨

            Benchmark `${{ matrix.name }}` (${{ inputs.benchmark_profile }}) failed! Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          comment-tag: bench-pr-comment-${{ matrix.id }}

      - name: Upload Benchmark Results
        if: inputs.mode == 'develop'
        shell: bash
        run: |
          bash scripts/cat-s3.sh vortex-ci-benchmark-results data.json.gz results.json

      - name: Ingest results to v3 server
        if: inputs.mode == 'develop' && vars.V3_INGEST_URL != ''
        shell: bash
        env:
          INGEST_BEARER_TOKEN: ${{ secrets.INGEST_BEARER_TOKEN }}
        run: |
          python3 scripts/post-ingest.py results.v3.jsonl \
            --server "${{ vars.V3_INGEST_URL }}" \
            --commit-sha "${{ github.sha }}" \
            --benchmark-id "${{ matrix.id }}" \
            --repo-url "${{ github.server_url }}/${{ github.repository }}"

      # v4 (Postgres) dual-write -- BEST-EFFORT during the migration soak (see bench.yml
      # for the full rationale). The v3 step above is hard-required; a v4 failure must NOT
      # fail the job (v4 is promoted to required at cutover, PR-5.1). Gated on
      # inputs.mode == 'develop' (matching v3) + the ingest-role ARN var (the assume-role
      # input that MUST exist for OIDC to succeed; it no-ops until v4 infra is wired), and
      # every step is continue-on-error. post-ingest.py mints the RDS IAM token (boto3) from
      # the assumed GitHubBenchmarkIngestRole; sslmode=verify-full validates the cert.
      #
      # ORDER MATTERS: "Install uv" runs BEFORE "Configure AWS credentials".
      # configure-aws-credentials persists the assumed ingest-role (rds-db:connect
      # only) as the job's ambient AWS creds; the uv setup compiles via sccache
      # (S3-backed), so running it after the role switch fails with S3 AccessDenied.
      # Installing uv first keeps sccache on the original S3-capable creds; the role
      # is assumed immediately before the ingest, which needs only rds-db:connect.
      - name: Install uv for v4 ingest
        if: inputs.mode == 'develop' && vars.GH_BENCH_INGEST_ROLE_ARN != ''
        continue-on-error: true
        uses: spiraldb/actions/.github/actions/setup-uv@a746510eafaa926484c354541cfc49b2ec06cc63  # 0.18.6
      - name: Configure AWS credentials for v4 ingest (OIDC)
        if: inputs.mode == 'develop' && vars.GH_BENCH_INGEST_ROLE_ARN != ''
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6
        with:
          role-to-assume: ${{ vars.GH_BENCH_INGEST_ROLE_ARN }}
          aws-region: ${{ vars.RDS_BENCH_REGION }}
      - name: Ingest results to v4 Postgres (best-effort)
        if: inputs.mode == 'develop' && vars.GH_BENCH_INGEST_ROLE_ARN != ''
        continue-on-error: true
        shell: bash
        env:
          RDS_BENCH_INSTANCE_ENDPOINT: ${{ vars.RDS_BENCH_INSTANCE_ENDPOINT }}
          RDS_BENCH_DB_NAME: ${{ vars.RDS_BENCH_DB_NAME }}
          AWS_REGION: ${{ vars.RDS_BENCH_REGION }}
          BENCH_SITE_BASE_URL: ${{ vars.BENCH_SITE_BASE_URL }}
          BENCH_REVALIDATE_TOKEN: ${{ secrets.BENCH_REVALIDATE_TOKEN }}
        run: |
          set -Eeuo pipefail
          curl -fsSL https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem \
            -o "${RUNNER_TEMP}/rds-global-bundle.pem"
          DSN="postgresql://bench_ingest@${RDS_BENCH_INSTANCE_ENDPOINT}:5432/${RDS_BENCH_DB_NAME}?sslmode=verify-full&sslrootcert=${RUNNER_TEMP}/rds-global-bundle.pem"
          uv run --no-project --with 'psycopg[binary]' --with boto3 --with xxhash \
            scripts/post-ingest.py results.v3.jsonl \
            --postgres "${DSN}" \
            --commit-sha "${{ github.sha }}" \
            --region "${AWS_REGION}"

      - name: Alert incident.io
        if: failure() && inputs.mode == 'develop'
        uses: ./.github/actions/alert-incident-io
        with:
          api-key: ${{ secrets.INCIDENT_IO_ALERT_TOKEN }}
          alert-title: "${{ matrix.name }} SQL benchmark failed on develop"
          deduplication-key: ci-sql-bench-${{ matrix.id }}-failure
