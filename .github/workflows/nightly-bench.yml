name: Nightly Benchmarks

on:
  schedule:
    - cron: '0 0 * * *'  # daily
  workflow_dispatch:

permissions:
  id-token: write  # enables AWS-GitHub OIDC
  actions: read
  contents: write
  deployments: write

jobs:
  sql:
    uses: ./.github/workflows/sql-benchmarks.yml
    secrets: inherit
    with:
      mode: 'develop'
      machine_type: ${{ matrix.machine_type.instance_name }}
      benchmark_matrix: |
        [
          {
            "id": "tpch-nvme-ddb-pq",
            "subcommand": "tpch",
            "name": "TPC-H on NVME",
            "targets": "duckdb:parquet",
            "scale_factor": "--scale-factor ${{ matrix.scale_factor }}"
          },
          {
            "id": "tpch-nvme-df-pq",
            "subcommand": "tpch",
            "name": "TPC-H on NVME",
            "targets": "datafusion:parquet",
            "scale_factor": "--scale-factor ${{ matrix.scale_factor }}"
          },
          {
            "id": "tpch-nvme-df-vx",
            "subcommand": "tpch",
            "name": "TPC-H on NVME",
            "targets": "datafusion:vortex",
            "scale_factor": "--scale-factor ${{ matrix.scale_factor }}"
          },
          {
            "id": "tpch-nvme-ddb-vx",
            "subcommand": "tpch",
            "name": "TPC-H on NVME",
            "targets": "duckdb:vortex",
            "scale_factor": "--scale-factor ${{ matrix.scale_factor }}"
          }

        ]
    strategy:
      # A single run not should kill the others
      fail-fast: false
      matrix:
        # currently 100 is failing I hope to address this.
        scale_factor: [ 100 ]
        machine_type:
          - id: x86
            instance_name: c6id.8xlarge
# TODO(joe): support other arch
#          - id: arm64
#            instance_name: c6gd.8xlarge
