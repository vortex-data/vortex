name: Nightly Benchmarks

on:
  schedule:
    - cron: '0 0 * * *'  # daily
  workflow_dispatch:

permissions:
  id-token: write  # enables AWS-GitHub OIDC
  actions: read
  contents: write
  deployments: write

jobs:
  sql:
    uses: ./.github/workflows/sql-benchmarks.yml
    secrets: inherit
    with:
      mode: 'develop'
      machine_type: ${{ matrix.machine_type.instance_name }}
      image_type: ${{ matrix.machine_type.image }}
      # datafusion:vortex uses a lot of memory
      benchmark_matrix: |
        [
          {
            "id": "tpch-nvme",
            "subcommand": "tpch",
            "name": "TPC-H on NVME",
            "targets": "duckdb:parquet",
            "scale_factor": "--scale-factor 1000"
          },
          {
            "id": "tpch-nvme",
            "subcommand": "tpch",
            "name": "TPC-H on NVME",
            "targets": "duckdb:vortex",
            "scale_factor": "--scale-factor 1000"
          },
          {
            "id": "tpch-nvme",
            "subcommand": "tpch",
            "name": "TPC-H on NVME",
            "targets": "datafusion:parquet",
            "scale_factor": "--scale-factor 1000"
          }
        ]
    strategy:
      # A single run not should kill the others
      fail-fast: false
      matrix:
        machine_type:
          - id: x86
            instance_name: c6id.12xlarge
            image: ubuntu24-full-x64
          # TODO(joe): support other arch
          - id: arm64
            instance_name: c6gd.12xlarge
            image: ubuntu24-full-arm64
