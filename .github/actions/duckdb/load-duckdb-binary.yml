name: build-duckdb-binary.yml
description: Build duckdb

env:
  DUCKDB_VERSION: v1.2.2

runs:
  - name: Cache duckdb compiled binary
    uses: runs-on/cache@v4
    id: cache-duckdb-binary
    with:
      fail-on-cache-miss: true
      key: "${{ runner.os }}-ducdkb-linux_amd64-${{ env.DUCKDB_VERSION }}"
      path: duckdb/build/release/duckdb

  - name: Add duckdb to path
    run: |
      export "`pwd`/duckdb/build/release/" >> $GITHUB_PATH
      echo $GITHUB_PATH
      duckdb --version