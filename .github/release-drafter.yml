name-template: '🌪 $RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'
categories:
  - title: '⚠️ Breaks'
    labels:
      - 'break'
      - 'wire-break'
  - title: '✨ Features'
    labels:
      - 'feature'
  - title: '🚀 Performance'
    labels:
      - 'performance'
  - title: '🐛 Bug Fixes'
    collapse-after: 8
    labels:
      - 'fix'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
    collapse-after: 3

version-resolver:
  major:
    labels:
      # We must explicitly label a PR with "major" to trigger a major version bump.
      - 'major'
  minor:
    labels:
      # Any features or breaks will trigger a minor version bump (while we are 0.x)
      - 'feature'
      - 'break'
      - 'wire-break'
  default: patch

template: |
  ## Changes

  $CHANGES
