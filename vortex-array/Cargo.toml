[package]
name = "vortex-array"
authors = { workspace = true }
categories = { workspace = true }
description = "Vortex in memory columnar data format"
edition = { workspace = true }
homepage = { workspace = true }
include = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
readme = "README.md"
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[package.metadata.docs.rs]
all-features = true

[lints]
workspace = true

[dependencies]
arbitrary = { workspace = true, optional = true }
arcref = { workspace = true }
arrow-arith = { workspace = true }
arrow-array = { workspace = true, features = ["ffi"] }
arrow-buffer = { workspace = true }
arrow-cast = { workspace = true }
arrow-data = { workspace = true }
arrow-ord = { workspace = true }
arrow-schema = { workspace = true }
arrow-select = { workspace = true }
arrow-string = { workspace = true }
async-lock = { workspace = true }
bytes = { workspace = true }
cfg-if = { workspace = true }
cudarc = { workspace = true, optional = true }
enum-iterator = { workspace = true }
flatbuffers = { workspace = true }
futures = { workspace = true, features = ["alloc", "async-await", "std"] }
goldenfile = { workspace = true, optional = true }
half = { workspace = true, features = ["num-traits"] }
humansize = { workspace = true }
inventory = { workspace = true }
itertools = { workspace = true }
jiff = { workspace = true }
multiversion = { workspace = true }
num-traits = { workspace = true }
num_enum = { workspace = true }
parking_lot = { workspace = true }
paste = { workspace = true }
pin-project-lite = { workspace = true }
primitive-types = { workspace = true, optional = true, features = [
    "arbitrary",
] }
prost = { workspace = true }
rand = { workspace = true }
rstest = { workspace = true, optional = true }
rstest_reuse = { workspace = true, optional = true }
rustc-hash = { workspace = true }
serde = { workspace = true, optional = true, features = ["derive", "rc"] }
simdutf8 = { workspace = true }
static_assertions = { workspace = true }
tabled = { workspace = true, optional = true, default-features = false, features = [
    "std",
] }
termtree = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
vortex-array-macros = { workspace = true }
vortex-buffer = { workspace = true, features = ["arrow"] }
vortex-error = { workspace = true, features = ["flatbuffers"] }
vortex-flatbuffers = { workspace = true, features = ["array", "dtype"] }
vortex-mask = { workspace = true }
vortex-proto = { workspace = true, features = ["dtype", "expr", "scalar"] }
vortex-session = { workspace = true }
vortex-utils = { workspace = true, features = ["dyn-traits"] }

[features]
arbitrary = ["dep:arbitrary", "dep:primitive-types"]
canonical_counter = []
cudarc = ["dep:cudarc"]
table-display = ["dep:tabled"]
_test-harness = ["dep:goldenfile", "dep:rstest", "dep:rstest_reuse"]
serde = ["dep:serde", "vortex-buffer/serde", "vortex-mask/serde"]

[dev-dependencies]
arrow-cast = { workspace = true }
divan = { workspace = true }
futures = { workspace = true, features = ["executor"] }
insta = { workspace = true }
rand_distr = { workspace = true }
rstest = { workspace = true }
serde_json = { workspace = true }
serde_test = { workspace = true }
vortex-array = { path = ".", features = ["_test-harness", "table-display"] }

[[bench]]
name = "cast_primitive"
harness = false

[[bench]]
name = "search_sorted"
harness = false

[[bench]]
name = "scalar_subtract"
harness = false

[[bench]]
name = "compare"
harness = false

[[bench]]
name = "take_patches"
harness = false

[[bench]]
name = "chunk_array_builder"
harness = false

[[bench]]
name = "scalar_at_struct"
harness = false

[[bench]]
name = "varbinview_compact"
harness = false

[[bench]]
name = "expr_large_struct_pack"
path = "benches/expr/large_struct_pack.rs"
harness = false

[[bench]]
name = "expr_case_when"
path = "benches/expr/case_when_bench.rs"
harness = false

[[bench]]
name = "chunked_dict_builder"
harness = false
