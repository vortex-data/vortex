name = "take_primitive"
harness = false

[[bench]]
name = "take_struct"
harness = false

[[bench]]
name = "take_fsl"
harness = false

[[bench]]
name = "filter_bool"
harness = false

[[bench]]
name = "listview_rebuild"
harness = false
