[package]
name = "vortex-scan"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Multi-file scanning operations for Vortex"

[dependencies]
vortex-array = { workspace = true }
vortex-buffer = { workspace = true }
vortex-dtype = { workspace = true }
vortex-error = { workspace = true }
vortex-expr = { workspace = true }
vortex-file = { workspace = true, features = ["tokio"] }
vortex-layout = { workspace = true }
vortex-mask = { workspace = true }
vortex-metrics = { workspace = true }

arrow-array = { workspace = true }
arrow-schema = { workspace = true }
async-trait = { workspace = true }
crossbeam-queue = { workspace = true }
dashmap = { workspace = true }
futures = { workspace = true }
itertools = { workspace = true }
tokio = { workspace = true, optional = false, features = [
    "rt-multi-thread",
    "macros",
] }

[features]
default = ["tokio"]
tokio = ["vortex-layout/tokio"]
roaring = ["vortex-layout/roaring"]
