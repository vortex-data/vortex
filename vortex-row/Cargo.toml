[package]
name = "vortex-row"
authors = { workspace = true }
categories = { workspace = true }
description = "Row-oriented byte encoder for Vortex arrays, analogous to arrow-row."
edition = { workspace = true }
homepage = { workspace = true }
include = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
publish = false
readme = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[lints]
workspace = true

[dependencies]
bytes = { workspace = true }
inventory = { workspace = true }
smallvec = { workspace = true }
vortex-array = { workspace = true }
vortex-buffer = { workspace = true }
vortex-error = { workspace = true }
vortex-mask = { workspace = true }
vortex-session = { workspace = true }
vortex-utils = { workspace = true }

[dev-dependencies]
arrow-array = { workspace = true }
arrow-row = { workspace = true }
arrow-schema = { workspace = true }
divan = { workspace = true }
mimalloc = { workspace = true }
rand = { workspace = true }
rstest = { workspace = true }
vortex-array = { workspace = true, features = ["_test-harness"] }
# Path-only (no version) dev-deps so the kernel benchmark can build encoded inputs. These
# crates depend on vortex-row, so this is a dev-dependency cycle (allowed by cargo because
# dev-deps are not part of the normal build graph); the bench is the only consumer.
vortex-fastlanes = { path = "../encodings/fastlanes" }
vortex-runend = { path = "../encodings/runend" }

[[bench]]
name = "row_encode"
harness = false

[[bench]]
name = "kernels"
harness = false
