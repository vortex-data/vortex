syntax = "proto3";

package vortex.scalar;

option java_package = "dev.vortex.proto";
option java_outer_classname = "ScalarProtos";

import "dtype.proto";
import "google/protobuf/struct.proto";

message Scalar {
  vortex.dtype.DType dtype = 1;
  ScalarValue value = 2;
}

message ScalarValue {
  oneof kind {
    google.protobuf.NullValue null_value = 1;
    bool bool_value = 2;
    sint64 int64_value = 3;
    uint64 uint64_value = 4;
    float f32_value = 5;
    double f64_value = 6;
    string string_value = 7;
    bytes bytes_value = 8;
    ListValue list_value = 9;
    uint64 f16_value = 10;
    // Variant scalars carry a row-specific nested scalar.
    // See RFC 0015: https://github.com/vortex-data/rfcs/blob/develop/accepted/0015-variant-type.md
    Scalar variant_value = 11;
  }
}

message ListValue {
  repeated ScalarValue values = 1;
}

message VariantValue {
  oneof kind {
    google.protobuf.NullValue null_value = 1;
    bool bool_value = 2;
    VariantPrimitive primitive_value = 3;
    VariantDecimal decimal_value = 4;
    string string_value = 5;
    bytes bytes_value = 6;
    VariantListValue list_value = 7;
    VariantObjectValue object_value = 8;
  }
}

message VariantPrimitive {
  oneof kind {
    sint64 int8_value = 1;
    sint64 int16_value = 2;
    sint64 int32_value = 3;
    sint64 int64_value = 4;
    uint64 uint8_value = 5;
    uint64 uint16_value = 6;
    uint64 uint32_value = 7;
    uint64 uint64_value = 8;
    uint32 f16_value = 9;
    float f32_value = 10;
    double f64_value = 11;
  }
}

message VariantDecimal {
  oneof kind {
    sint64 int8_value = 1;
    sint64 int16_value = 2;
    sint64 int32_value = 3;
    sint64 int64_value = 4;
    bytes int128_value = 5;
    bytes int256_value = 6;
  }
}

message VariantListValue {
  repeated VariantValue values = 1;
}

message VariantObjectField {
  string name = 1;
  VariantValue value = 2;
}

message VariantObjectValue {
  repeated VariantObjectField fields = 1;
}
