[package]
name = "vortex-wasm"
description = "WASM bindings for Vortex"
authors.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true
include.workspace = true
keywords.workspace = true
license.workspace = true
readme.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
async-fs = { workspace = true }
hex = { workspace = true }
phf = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde-wasm-bindgen = "0.6"
serde_json = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
vortex = { workspace = true, features = ["tokio"] }
vortex-array = { workspace = true }
vortex-buffer = { workspace = true }
vortex-dtype = { workspace = true }
vortex-error = { workspace = true }
vortex-file = { workspace = true }
vortex-io = { workspace = true }
vortex-layout = { workspace = true }
vortex-metrics = { workspace = true }
vortex-scalar = { workspace = true }
vortex-session = { workspace = true }
wasm-bindgen = "0.2"
wasm-bindgen-futures = { workspace = true }

[dependencies.web-sys]
features = ["console", "Window", "Response"]
version = "0.3"

[dependencies.js-sys]
version = "0.3"

[[bin]]
name = "migrate"
path = "src/bin/migrate.rs"

[[bin]]
name = "append"
path = "src/bin/append.rs"

[[bin]]
name = "test_s3_read"
path = "src/bin/test_s3_read.rs"

[[bin]]
name = "test_s3_update"
path = "src/bin/test_s3_update.rs"

[[bin]]
name = "migrate_random_access"
path = "src/bin/migrate_random_access.rs"

[lints]
workspace = true
