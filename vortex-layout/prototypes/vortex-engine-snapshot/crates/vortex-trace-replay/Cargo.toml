[package]
name = "vortex-trace-replay"
version = "0.1.0"
edition = "2024"
rust-version = "1.91"
license = "Apache-2.0"
description = "Replay engine for vortex-engine *.vtrx trace files"
publish = false

[lib]
crate-type = ["lib"]

[dependencies]
vortex-trace-format = { path = "../vortex-trace-format" }
serde = { version = "1.0", features = ["derive"] }
postcard = { version = "1.0", features = ["alloc"] }
thiserror = "2.0"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
memmap2 = "0.9"

[dev-dependencies]
tempfile = "3.10"

[[bin]]
name = "vtrace"
path = "src/bin/vtrace.rs"

[features]
default = ["cli"]
cli = ["dep:clap", "dep:serde_json"]

[dependencies.clap]
version = "4.5"
features = ["derive"]
optional = true

[dependencies.serde_json]
version = "1.0"
optional = true
