[package]
name = "vortex-trace-format"
version = "0.1.0"
edition = "2024"
rust-version = "1.91"
license = "Apache-2.0"
description = "On-disk schema and framing for vortex-engine *.vtrx trace files"
publish = false

[dependencies]
serde = { version = "1.0", default-features = false, features = ["alloc", "derive"] }
postcard = { version = "1.0", default-features = false, features = ["alloc"] }

[dev-dependencies]
postcard = { version = "1.0", default-features = false, features = ["alloc"] }
