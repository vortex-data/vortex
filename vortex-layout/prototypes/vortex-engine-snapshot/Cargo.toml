[workspace]
members = [
    ".",
    "crates/vortex-trace-format",
    "crates/vortex-trace-replay",
    "viewer/crate",
]
resolver = "2"

[package]
name = "vortex-engine"
version = "0.1.0"
edition = "2024"
authors = ["Vortex Authors <hello@vortex.dev>"]
categories = ["database-implementations", "data-structures"]
description = "Physical query execution engine built around Vortex arrays"
homepage = "https://github.com/spiraldb/vortex-engine"
keywords = ["vortex", "query-engine", "execution"]
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/spiraldb/vortex-engine"
rust-version = "1.91"

[dependencies]
blocking = "1.6"
crossbeam-channel = "0.5"
crossbeam-deque = "0.8"
crossbeam-queue = "0.3"
parking = "2"
event-listener = "5"
futures = { version = "0.3.31", default-features = false }
parking_lot = "0.12.5"
pin-project-lite = "0.2.15"
smol = "2.0.2"
thiserror = "2.0.3"
vortex = { git = "https://github.com/spiraldb/vortex", branch = "develop", default-features = true }
vortex-array = { git = "https://github.com/spiraldb/vortex", branch = "develop", default-features = false }
vortex-buffer = { git = "https://github.com/spiraldb/vortex", branch = "develop", default-features = false }
vortex-error = { git = "https://github.com/spiraldb/vortex", branch = "develop" }
vortex-file = { git = "https://github.com/spiraldb/vortex", branch = "develop", default-features = false }
vortex-io = { git = "https://github.com/spiraldb/vortex", branch = "develop", default-features = false }
vortex-layout = { git = "https://github.com/spiraldb/vortex", branch = "develop", default-features = false }
vortex-mask = { git = "https://github.com/spiraldb/vortex", branch = "develop", default-features = false }
vortex-session = { git = "https://github.com/spiraldb/vortex", branch = "develop", default-features = false }
vortex-utils = { git = "https://github.com/spiraldb/vortex", branch = "develop", default-features = false }

# Point vortex deps at the local working copy so in-progress changes
# to the subtract pushdown / Sum kernels are picked up without
# round-tripping through git. Remove the `[patch]` section to go back
# to the pinned `develop` SHA.
[patch."https://github.com/spiraldb/vortex"]
vortex = { path = "/Users/ngates/git/vortex/vortex" }
vortex-array = { path = "/Users/ngates/git/vortex/vortex-array" }
vortex-buffer = { path = "/Users/ngates/git/vortex/vortex-buffer" }
vortex-error = { path = "/Users/ngates/git/vortex/vortex-error" }
vortex-file = { path = "/Users/ngates/git/vortex/vortex-file" }
vortex-io = { path = "/Users/ngates/git/vortex/vortex-io" }
vortex-layout = { path = "/Users/ngates/git/vortex/vortex-layout" }
vortex-mask = { path = "/Users/ngates/git/vortex/vortex-mask" }
vortex-session = { path = "/Users/ngates/git/vortex/vortex-session" }
vortex-utils = { path = "/Users/ngates/git/vortex/vortex-utils" }
vortex-datafusion = { path = "/Users/ngates/git/vortex/vortex-datafusion" }
vortex-datetime-parts = { path = "/Users/ngates/git/vortex/encodings/datetime-parts" }

[dev-dependencies]
arrow-schema = "58"
datafusion = { version = "53", default-features = false, features = ["sql"] }
datafusion-catalog = { version = "53" }
datafusion-physical-plan = { version = "53" }
futures = { version = "0.3.31", features = ["executor"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
vortex-datafusion = { git = "https://github.com/spiraldb/vortex", branch = "develop" }

[profile.release]
debug = "line-tables-only"

[[bin]]
name = "v2_avg"
path = "src/bin/v2_avg.rs"

[[bin]]
name = "v2_sum_event_diff"
path = "src/bin/v2_sum_event_diff.rs"

[[bin]]
name = "q20_graph_dump"
path = "src/bin/q20_graph_dump.rs"

[[bin]]
name = "q3"
path = "src/bin/q3.rs"

[[bin]]
name = "q5"
path = "src/bin/q5.rs"

[[bin]]
name = "q20_direct"
path = "src/bin/q20_direct.rs"

[[bin]]
name = "q20_vortex_scan"
path = "src/bin/q20_vortex_scan.rs"

[lints.rust]
let_underscore_drop = "deny"
macro_use_extern_crate = "deny"
redundant_lifetimes = "deny"
unsafe_op_in_unsafe_fn = "deny"
unused_lifetimes = "deny"
unused_qualifications = "deny"
unexpected_cfgs = { level = "deny", check-cfg = [
    "cfg(codspeed)",
    'cfg(target_os, values("unknown"))',
] }
warnings = "warn"

[lints.clippy]
all = { level = "deny", priority = -1 }
as_ptr_cast_mut = "deny"
borrow_as_ptr = "deny"
cargo = { level = "deny", priority = -1 }
cast_possible_truncation = "deny"
cognitive_complexity = "deny"
collection_is_never_read = "deny"
dbg_macro = "deny"
debug_assert_with_mut_call = "deny"
derive_partial_eq_without_eq = "deny"
equatable_if_let = "deny"
exit = "deny"
expect_fun_call = "deny"
expect_used = "deny"
fallible_impl_from = "deny"
get_unwrap = "deny"
host_endian_bytes = "deny"
if_then_some_else_none = "deny"
inconsistent_struct_constructor = "deny"
manual_assert = "deny"
manual_is_variant_and = "deny"
many_single_char_names = "deny"
mem_forget = "deny"
multiple_crate_versions = "allow"
needless_range_loop = "allow"
or_fun_call = "deny"
panic = "deny"
clone_on_ref_ptr = "deny"
redundant_clone = "deny"
same_name_method = "deny"
tests_outside_test_module = "deny"
unwrap_in_result = "deny"
unwrap_used = "deny"
use_debug = "deny"
