[package]
name = "vortex-compressor"
authors = { workspace = true }
categories = { workspace = true }
description = "Encoding-agnostic compression framework for Vortex arrays"
edition = { workspace = true }
homepage = { workspace = true }
include = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
readme = { workspace = true }
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[dependencies]
itertools = { workspace = true }
num-traits = { workspace = true }
parking_lot = { workspace = true }
rand = { workspace = true }
rustc-hash = { workspace = true }
tracing = { workspace = true, features = ["std", "attributes"] }
vortex-array = { workspace = true }
vortex-buffer = { workspace = true }
vortex-error = { workspace = true }
vortex-mask = { workspace = true }
vortex-utils = { workspace = true }

# Cloudflare's `cardinality-estimator` uses a tagged-pointer representation gated on a 64-bit
# pointer width, so it cannot compile on 32-bit targets. On those platforms we fall back to the
# pure `hyperloglogplus` crate; the two backends are unified by the wrapper in `stats::cardinality`.
[target.'cfg(target_pointer_width = "64")'.dependencies]
cardinality-estimator = { workspace = true }

[target.'cfg(not(target_pointer_width = "64"))'.dependencies]
hyperloglogplus = { workspace = true }

[dev-dependencies]
divan = { workspace = true }
rstest = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
vortex-array = { workspace = true, features = ["_test-harness"] }
vortex-session = { workspace = true }

[lints]
workspace = true

[[bench]]
name = "dict_encode"
harness = false
test = false

[[bench]]
name = "stats_calc"
harness = false
test = false
