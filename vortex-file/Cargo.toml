[package]
name = "vortex-file"
authors = { workspace = true }
categories = { workspace = true }
description = "Vortex file readers and writers"
edition = { workspace = true }
homepage = { workspace = true }
include = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
readme = "README.md"
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[package.metadata.docs.rs]
all-features = true

[dependencies]
async-trait = { workspace = true }
bytes = { workspace = true }
cudarc = { workspace = true, optional = true }
flatbuffers = { workspace = true }
futures = { workspace = true, features = ["std", "async-await"] }
# Needed to pickup the "wasm_js" feature for wasm targets from the workspace configuration
getrandom_v03 = { workspace = true }
itertools = { workspace = true }
kanal = { workspace = true }
log = { workspace = true }
object_store = { workspace = true, optional = true }
parking_lot = { workspace = true }
tokio = { workspace = true, features = ["rt"], optional = true }
# Needed to pickup the "js" feature for wasm targets from the workspace configuration
uuid = { workspace = true }
vortex-alp = { workspace = true }
vortex-array = { workspace = true }
vortex-buffer = { workspace = true }
vortex-bytebool = { workspace = true }
vortex-datetime-parts = { workspace = true }
vortex-decimal-byte-parts = { workspace = true }
vortex-dict = { workspace = true }
vortex-dtype = { workspace = true }
vortex-error = { workspace = true }
vortex-fastlanes = { workspace = true }
vortex-flatbuffers = { workspace = true, features = ["file"] }
vortex-fsst = { workspace = true }
vortex-gpu = { workspace = true, optional = true }
vortex-io = { workspace = true }
vortex-layout = { workspace = true }
vortex-metrics = { workspace = true }
vortex-pco = { workspace = true }
vortex-runend = { workspace = true }
vortex-scalar = { workspace = true }
vortex-scan = { workspace = true }
vortex-sequence = { workspace = true }
vortex-session = { workspace = true }
vortex-sparse = { workspace = true }
vortex-utils = { workspace = true, features = ["dashmap"] }
vortex-zigzag = { workspace = true }
vortex-zstd = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
vortex-array = { workspace = true, features = ["test-harness"] }
vortex-io = { workspace = true, features = ["tokio"] }
vortex-scan = { workspace = true, features = ["tokio"] }

[lints]
workspace = true

[features]
object_store = ["dep:object_store", "vortex-io/object_store", "tokio"]
tokio = [
    "dep:tokio",
    "vortex-error/tokio",
    "vortex-io/tokio",
    "vortex-layout/tokio",
    "vortex-scan/tokio",
]
zstd = ["dep:vortex-zstd", "vortex-layout/zstd"]
gpu = [
    "dep:cudarc",
    "dep:vortex-gpu",
    "vortex-gpu/cuda",
    "vortex-layout/gpu",
    "vortex-scan/gpu",
]
