[package]
name = "vortex-onpair-rs"
description = "Pure-Rust port of the OnPair short-string compression library"
authors = { workspace = true }
categories = { workspace = true }
edition = { workspace = true }
homepage = { workspace = true }
include = { workspace = true }
keywords = { workspace = true }
license = { workspace = true }
readme = "README.md"
repository = { workspace = true }
rust-version = { workspace = true }
version = { workspace = true }

[lints]
workspace = true

[dependencies]
aho-corasick = { workspace = true }
hashbrown = { workspace = true }
memchr = { workspace = true }
rand = { workspace = true }
# Experiment-only: alternative hashers for the LPM maps, selected by feature.
ahash = { version = "0.8", optional = true }
rustc-hash = { version = "2", optional = true }
rapidhash = { version = "1", optional = true }
wyhash = { version = "0.5", optional = true }
gxhash = { version = "3", optional = true }

[features]
# Internal: print per-section timings of train()/parse() for profiling.
lpm-stats = []
# Experiment-only hasher selection for the LPM short/long maps (default =
# hashbrown's foldhash). Used to benchmark hashers; not for shipping.
hash-ahash = ["dep:ahash"]
hash-rustc = ["dep:rustc-hash"]
hash-rapid = ["dep:rapidhash"]
hash-wy = ["dep:wyhash"]
hash-gxhash = ["dep:gxhash"]

[dev-dependencies]
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
divan = { workspace = true }
parquet = { workspace = true }
rstest = { workspace = true }
tpchgen = { workspace = true }
tpchgen-arrow = { workspace = true }
vortex-onpair-sys = { workspace = true }

[[bench]]
name = "clickbench"
harness = false

[[example]]
name = "bench_tpch"
path = "examples/bench_tpch.rs"

[[example]]
name = "gen_l_comment"
path = "examples/gen_l_comment.rs"

[[example]]
name = "bench_gather"
path = "examples/bench_gather.rs"

[[example]]
name = "bench_find"
path = "examples/bench_find.rs"

[[example]]
name = "bench_parallel"
path = "examples/bench_parallel.rs"

[[example]]
name = "bench_pack"
path = "examples/bench_pack.rs"
