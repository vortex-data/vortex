# Example Frame-of-Reference + bit-packing decoder kernel. Build with:
#   cargo build -p for-bitpack-kernel --target wasm32-unknown-unknown --release
#
# Excluded from the main workspace (see the root Cargo.toml `exclude`); only meaningful for wasm32.

[workspace]

[package]
name = "for-bitpack-kernel"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
vortex-wasm-guest = { path = "../.." }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
